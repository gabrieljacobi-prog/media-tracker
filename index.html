<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #7c6cff;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --danger: #ff5c72;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .year-tag {
      font-size: 12px; font-weight: 600;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 2px 8px; color: var(--text-muted);
      margin-left: 6px;
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
      transition: background 0.3s;
    }
    .sync-dot.synced  { background: #52c41a; }
    .sync-dot.syncing { background: #faad14; animation: pulse 1s infinite; }
    .sync-dot.error   { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    .btn {
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s; display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { opacity: .82; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: var(--surface2); color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-icon {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 8px;
      padding: 7px 10px; cursor: pointer; transition: opacity .15s;
      display: flex; align-items: center;
    }
    .btn-icon:hover { opacity: .8; }
    .btn-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }

    /* Dropdown menu */
    .menu-wrap { position: relative; }
    .dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 6px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px; min-width: 160px; z-index: 100;
      box-shadow: 0 8px 24px #0008;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 7px; font-size: 13px;
      color: var(--text-muted); cursor: pointer; transition: background .12s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .dropdown-item:hover { background: var(--surface2); color: var(--text); }
    .dropdown-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; flex-shrink: 0; }

    .container { max-width: 860px; margin: 0 auto; }

    /* Stats */
    .stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 13px; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-chip svg { width: 13px; height: 13px; stroke: currentColor; fill: none; flex-shrink: 0; }
    .stat-chip .n { font-weight: 700; }

    /* Card / form */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 18px;
    }
    .card-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted); margin-bottom: 16px;
    }

    label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .4px;
      display: block; margin-bottom: 6px;
    }
    input[type=text], input[type=number] {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      padding: 9px 12px; outline: none; transition: border-color .15s;
      font-family: inherit; width: 100%;
    }
    input:focus { border-color: var(--accent); }

    .form-row { display: grid; grid-template-columns: 1fr 120px; gap: 12px; margin-bottom: 14px; }
    @media(max-width:500px){ .form-row { grid-template-columns: 1fr; } }

    .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }

    /* Category pills */
    .cat-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cat-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 2px solid transparent;
      background: var(--surface2); color: var(--text-muted);
      transition: all .15s;
    }
    .cat-pill svg { width: 13px; height: 13px; stroke: currentColor; fill: none; flex-shrink: 0; }
    .cat-pill.active { color: #fff; }
    .cat-pill.add-custom {
      border-style: dashed; border-color: var(--border); color: var(--text-muted);
    }
    .cat-pill.add-custom:hover { border-color: var(--accent); color: var(--accent); }

    .custom-input-wrap { display: none; align-items: center; gap: 6px; }
    .custom-input-wrap.visible { display: flex; }
    .custom-input-wrap input { width: 150px; padding: 6px 10px; font-size: 13px; }
    .custom-input-wrap .btn { padding: 6px 12px; font-size: 13px; }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px;
      flex-wrap: wrap; align-items: center;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; stroke: var(--text-muted); fill: none; pointer-events: none;
    }
    .search-wrap input { padding-left: 32px; }

    .filter-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text-muted); transition: all .15s;
    }
    .filter-pill svg { width: 12px; height: 12px; stroke: currentColor; fill: none; flex-shrink: 0; }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Entries grouped by year */
    .year-group { margin-bottom: 28px; }
    .year-heading {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-muted);
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .year-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .entry-list { display: flex; flex-direction: column; gap: 2px; }
    .entry-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      transition: background .1s;
    }
    .entry-row:hover { background: var(--surface2); }

    .entry-title { flex: 1; font-size: 14px; font-weight: 600; min-width: 0; }
    .entry-title span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

    .cat-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .cat-badge svg { width: 11px; height: 11px; stroke: currentColor; fill: none; flex-shrink: 0; }

    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 6px;
      display: flex; align-items: center; transition: all .15s; flex-shrink: 0;
    }
    .del-btn:hover { background: #ff5c7220; color: var(--danger); }
    .del-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--text-muted);
    }
    .empty-state svg { width: 36px; height: 36px; stroke: var(--border); fill: none; display: block; margin: 0 auto 12px; }
    .empty-state p { font-size: 15px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--accent); color: #fff;
      padding: 10px 18px; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transform: translateY(8px);
      transition: all .25s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
    </div>
    <div style="display:flex;align-items:baseline;gap:4px">
      <h1>Media Tracker</h1>
      <span class="year-tag" id="yearTag"></span>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-dot" id="syncDot" title="Sync status"></div>
    <div class="menu-wrap">
      <button class="btn-icon" id="menuBtn" title="More options">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
      </button>
      <div class="dropdown" id="menuDropdown">
        <button class="dropdown-item" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="toggleForm()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Log Entry
    </button>
  </div>
</header>

<div class="container">

  <div class="stats" id="stats"></div>

  <!-- Add form -->
  <div class="card" id="addForm" style="display:none">
    <div class="card-title">New Entry</div>
    <div class="form-row">
      <div>
        <label>Title</label>
        <input id="inputTitle" type="text" placeholder="e.g. Dune: Part Two" />
      </div>
      <div>
        <label>Year</label>
        <input id="inputYear" type="number" min="1900" max="2099" />
      </div>
    </div>
    <label>Category</label>
    <div class="cat-pills" id="typePills"></div>
    <div class="custom-input-wrap" id="customInputWrap">
      <input id="customCatInput" type="text" placeholder="Category name…" />
      <button class="btn btn-primary" onclick="confirmCustomCat()">Add</button>
      <button class="btn btn-ghost" onclick="cancelCustomCat()">Cancel</button>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="toggleForm()">Cancel</button>
      <button class="btn btn-primary" onclick="addEntry()">Save Entry</button>
    </div>
  </div>

  <!-- Filter + search -->
  <div class="filter-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search titles…" oninput="renderEntries()" />
    </div>
    <div class="filter-pills" id="filterPills"></div>
  </div>

  <div id="entriesList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Firebase ──────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyArOMqSQL04Dd7ff_8g_G9872tXO9XkiAc",
    authDomain: "media-tracker-a00cf.firebaseapp.com",
    projectId: "media-tracker-a00cf",
    storageBucket: "media-tracker-a00cf.firebasestorage.app",
    messagingSenderId: "839766001354",
    appId: "1:839766001354:web:4520dfe872f4039aac9633"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const col = db.collection('entries');

  // ── SVG icons ─────────────────────────────────────────────
  const ICONS = {
    movies:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>`,
    tv:         `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="15" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>`,
    book:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
    gamepad:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="17" y2="13"/><path d="M9.45 5.28A2 2 0 0 1 11.4 4h1.2a2 2 0 0 1 1.95 1.28l1.03 2.76A2 2 0 0 0 17.54 9.3l.53.13A2 2 0 0 1 19.5 11.33V14a2 2 0 0 1-2 2h-11a2 2 0 0 1-2-2v-2.67a2 2 0 0 1 1.43-1.91l.53-.13a2 2 0 0 0 1.96-1.26z"/></svg>`,
    headphones: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg>`,
    mic:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
    scroll:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/></svg>`,
    music:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
    tag:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>`,
    list:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
  };

  // ── Built-in categories ───────────────────────────────────
  const BUILT_IN = [
    { id: 'Movies',      label: 'Movies',      color: '#ff7a45', icon: ICONS.movies },
    { id: 'TV Shows',    label: 'TV Shows',    color: '#1890ff', icon: ICONS.tv },
    { id: 'Books',       label: 'Books',       color: '#52c41a', icon: ICONS.book },
    { id: 'Video Games', label: 'Video Games', color: '#722ed1', icon: ICONS.gamepad },
    { id: 'Audiobooks',  label: 'Audiobooks',  color: '#7c6cff', icon: ICONS.headphones },
    { id: 'Podcasts',    label: 'Podcasts',    color: '#faad14', icon: ICONS.mic },
    { id: 'Comics',      label: 'Comics',      color: '#13c2c2', icon: ICONS.scroll },
    { id: 'Concerts',    label: 'Concerts',    color: '#fa541c', icon: ICONS.music },
  ];

  // ── State ─────────────────────────────────────────────────
  let entries = [];
  let customCats = JSON.parse(localStorage.getItem('customCats') || '[]');
  let selectedCat = BUILT_IN[0].id;
  let activeFilter = 'All';

  function allCats() {
    return [...BUILT_IN, ...customCats.map(c => ({ id: c, label: c, color: '#8888aa', icon: ICONS.tag }))];
  }
  function catMeta(id) {
    return allCats().find(c => c.id === id) || { id, label: id, color: '#8888aa', icon: ICONS.tag };
  }

  // ── Init ──────────────────────────────────────────────────
  document.getElementById('yearTag').textContent = new Date().getFullYear();
  document.getElementById('inputYear').value = new Date().getFullYear();
  buildTypePills();
  buildFilterPills();

  function setSyncStatus(state) {
    document.getElementById('syncDot').className = 'sync-dot ' + state;
  }

  setSyncStatus('syncing');
  col.orderBy('createdAt', 'desc').onSnapshot(
    snap => {
      entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setSyncStatus('synced');
      renderAll();
    },
    err => { setSyncStatus('error'); console.error(err); }
  );

  // ── Pill builders ─────────────────────────────────────────
  function buildTypePills() {
    const wrap = document.getElementById('typePills');
    wrap.innerHTML = allCats().map(c => {
      const isActive = c.id === selectedCat;
      const style = isActive ? `background:${c.color};border-color:${c.color}` : '';
      return `<div class="cat-pill${isActive ? ' active' : ''}" data-cat="${c.id}" style="${style}">${c.icon} ${c.label}</div>`;
    }).join('') + `<div class="cat-pill add-custom" id="addCustomBtn">${ICONS.tag} Custom…</div>`;

    wrap.querySelectorAll('.cat-pill[data-cat]').forEach(pill => {
      pill.addEventListener('click', () => { selectedCat = pill.dataset.cat; buildTypePills(); });
    });
    document.getElementById('addCustomBtn').addEventListener('click', () => {
      document.getElementById('customInputWrap').classList.add('visible');
      document.getElementById('customCatInput').focus();
    });
  }

  function buildFilterPills() {
    const wrap = document.getElementById('filterPills');
    const cats = [{ id: 'All', label: 'All', color: null, icon: ICONS.list }, ...allCats()];
    wrap.innerHTML = cats.map(c =>
      `<div class="filter-pill${c.id === activeFilter ? ' active' : ''}" data-filter="${c.id}">${c.icon} ${c.label}</div>`
    ).join('');
    wrap.querySelectorAll('.filter-pill').forEach(p => {
      p.addEventListener('click', () => { activeFilter = p.dataset.filter; buildFilterPills(); renderEntries(); });
    });
  }

  // ── Custom category ───────────────────────────────────────
  function confirmCustomCat() {
    const val = document.getElementById('customCatInput').value.trim();
    if (!val) return;
    if (!customCats.includes(val) && !BUILT_IN.find(c => c.id === val)) {
      customCats.push(val);
      localStorage.setItem('customCats', JSON.stringify(customCats));
    }
    selectedCat = val;
    cancelCustomCat();
    buildTypePills();
    buildFilterPills();
  }
  function cancelCustomCat() {
    document.getElementById('customInputWrap').classList.remove('visible');
    document.getElementById('customCatInput').value = '';
  }
  document.getElementById('customCatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmCustomCat();
    if (e.key === 'Escape') cancelCustomCat();
  });

  // ── Form ──────────────────────────────────────────────────
  function toggleForm() {
    const form = document.getElementById('addForm');
    const open = form.style.display !== 'none';
    form.style.display = open ? 'none' : 'block';
    if (!open) { document.getElementById('inputTitle').focus(); buildTypePills(); }
  }

  async function addEntry() {
    const title = document.getElementById('inputTitle').value.trim();
    const year  = parseInt(document.getElementById('inputYear').value) || new Date().getFullYear();
    if (!title) { showToast('Please enter a title.'); return; }
    setSyncStatus('syncing');
    try {
      await col.add({ title, year, type: selectedCat, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputYear').value = new Date().getFullYear();
      toggleForm();
      showToast('Entry saved!');
    } catch(e) {
      setSyncStatus('error');
      showToast('Error saving — check connection.');
      console.error(e);
    }
  }
  document.getElementById('inputTitle').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

  // ── Delete ────────────────────────────────────────────────
  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    setSyncStatus('syncing');
    try { await col.doc(id).delete(); showToast('Deleted.'); }
    catch(e) { setSyncStatus('error'); showToast('Error deleting.'); }
  }

  // ── Render ────────────────────────────────────────────────
  function renderAll() { renderStats(); renderEntries(); buildFilterPills(); }

  function renderStats() {
    const el = document.getElementById('stats');
    let html = `<div class="stat-chip">${ICONS.list}<span class="n">${entries.length}</span> total</div>`;
    allCats().forEach(c => {
      const n = entries.filter(e => e.type === c.id).length;
      if (n > 0) html += `<div class="stat-chip" style="color:${c.color}">${c.icon}<span class="n">${n}</span> ${c.label}</div>`;
    });
    document.getElementById('stats').innerHTML = html;
  }

  function getYear(e) {
    if (e.year) return parseInt(e.year);
    if (e.date) return parseInt(e.date.split('-')[0]);
    return 0;
  }

  function renderEntries() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const el = document.getElementById('entriesList');

    let filtered = entries.filter(e => {
      const matchCat = activeFilter === 'All' || e.type === activeFilter;
      const matchSearch = !search || (e.title || '').toLowerCase().includes(search);
      return matchCat && matchSearch;
    });

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state">
        ${ICONS.list}
        <p>${entries.length === 0 ? 'No entries yet — log your first!' : 'No entries match your search.'}</p>
      </div>`;
      return;
    }

    // Group by year, descending
    const byYear = {};
    filtered.forEach(e => { const y = getYear(e); (byYear[y] = byYear[y] || []).push(e); });
    const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);

    el.innerHTML = years.map(y => {
      const rows = byYear[y].map(e => {
        const meta = catMeta(e.type);
        return `<div class="entry-row">
          <div class="entry-title"><span>${escHtml(e.title)}</span></div>
          <div class="cat-badge" style="background:${meta.color}1a;color:${meta.color}">${meta.icon} ${meta.label}</div>
          <button class="del-btn" onclick="deleteEntry('${e.id}')" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`;
      }).join('');
      return `<div class="year-group">
        <div class="year-heading">${y || 'Unknown'}</div>
        <div class="entry-list">${rows}</div>
      </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    closeMenu();
    if (!entries.length) { showToast('Nothing to export yet.'); return; }
    const rows = entries.map(e => [`"${(e.title||'').replace(/"/g,'""')}"`, getYear(e), e.type].join(','));
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['Title,Year,Category\n' + rows.join('\n')], { type: 'text/csv' }));
    a.download = `media-log-${new Date().getFullYear()}.csv`;
    a.click();
    showToast('CSV exported!');
  }

  // ── Menu ──────────────────────────────────────────────────
  document.getElementById('menuBtn').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('menuDropdown').classList.toggle('open');
  });
  document.addEventListener('click', closeMenu);
  function closeMenu() { document.getElementById('menuDropdown').classList.remove('open'); }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
