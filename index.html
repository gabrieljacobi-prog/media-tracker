<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #7c6cff;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --danger: #ff5c72;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    svg { display: block; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }

    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0; transition: background .3s;
    }
    .sync-dot.synced  { background: #52c41a; }
    .sync-dot.syncing { background: #faad14; animation: blink 1s infinite; }
    .sync-dot.error   { background: var(--danger); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── BUTTONS ── */
    .btn {
      border: none; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity .15s; border-radius: 10px;
      font-size: 14px; font-weight: 600;
    }
    .btn:hover { opacity: .82; }
    .btn-primary { background: var(--accent); color: #fff; padding: 10px 16px; }
    .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); padding: 10px 16px; }
    .btn-icon {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); padding: 10px; border-radius: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; flex-shrink: 0;
    }
    .btn-icon:hover { opacity: .8; }
    .btn-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .btn-add svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .btn-add-label { } /* shown on desktop */
    @media (max-width: 480px) {
      .btn-add-label { display: none; }
      .btn-primary.btn-add { padding: 10px 12px; border-radius: 10px; }
      .logo-text { font-size: 16px; }
    }

    /* ── DROPDOWN ── */
    .menu-wrap { position: relative; }
    .dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 8px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px; min-width: 180px;
      z-index: 200; box-shadow: 0 12px 32px #0009;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px; font-size: 14px;
      color: var(--text-muted); cursor: pointer; transition: background .12s;
      border: none; background: none; width: 100%; text-align: left; font-family: inherit;
    }
    .dropdown-item:hover, .dropdown-item.selected { background: var(--surface2); color: var(--text); }
    .dropdown-item.selected { color: var(--accent); }
    .dropdown-item svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── MAIN LAYOUT ── */
    .container { max-width: 700px; margin: 0 auto; padding: 0 16px; }

    /* ── YEAR NAV ── */
    .year-nav {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      padding: 20px 0 16px;
    }
    .year-nav-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      color: var(--text-muted); display: flex; align-items: center;
      transition: all .15s;
    }
    .year-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .year-nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .year-display {
      font-size: 28px; font-weight: 800; letter-spacing: -1px;
      min-width: 90px; text-align: center;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 16px;
    }

    .cat-filter-wrap { position: relative; flex-shrink: 0; }
    .cat-filter-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--text-muted);
      transition: all .15s; font-family: inherit; white-space: nowrap;
    }
    .cat-filter-btn:hover, .cat-filter-btn.active { border-color: var(--accent); color: var(--text); }
    .cat-filter-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .cat-filter-btn .chevron { width: 14px; height: 14px; opacity: .6; transition: transform .2s; }
    .cat-filter-btn.open .chevron { transform: rotate(180deg); }

    /* search */
    .search-wrap { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .search-input-field {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      padding: 10px 14px; outline: none; font-family: inherit;
      width: 0; opacity: 0; transition: width .25s, opacity .2s, border-color .15s;
      pointer-events: none;
    }
    .search-input-field.open {
      width: 180px; opacity: 1; pointer-events: all;
    }
    @media (max-width: 420px) {
      .search-input-field.open { width: 130px; }
    }
    .search-input-field:focus { border-color: var(--accent); }

    /* ── STATS ── */
    .stats-line {
      font-size: 13px; color: var(--text-muted);
      padding-bottom: 14px; display: flex; gap: 12px; flex-wrap: wrap;
    }
    .stats-line span { display: flex; align-items: center; gap: 5px; }
    .stats-line svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .stats-line .total { font-weight: 700; color: var(--text); }

    /* ── ADD FORM ── */
    .add-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
      display: none;
    }
    .add-form.open { display: block; }
    .form-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted); margin-bottom: 16px;
    }
    label {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 7px;
    }
    input[type=text], input[type=number] {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 16px;
      padding: 12px 14px; outline: none; transition: border-color .15s;
      font-family: inherit; width: 100%;
    }
    input:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 120px; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 420px) { .form-row { grid-template-columns: 1fr; } }

    /* category pills in form */
    .cat-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cat-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 2px solid transparent;
      background: var(--surface2); color: var(--text-muted); transition: all .15s;
    }
    .cat-pill svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .cat-pill.active { color: #fff; }
    .cat-pill.add-pill { border-style: dashed; border-color: var(--border); }
    .cat-pill.add-pill:hover { border-color: var(--accent); color: var(--accent); }

    .custom-row { display: none; align-items: center; gap: 8px; margin-bottom: 16px; }
    .custom-row.open { display: flex; }
    .custom-row input { font-size: 15px; padding: 10px 13px; }
    .custom-row .btn { padding: 10px 14px; font-size: 14px; }

    .form-actions { display: flex; justify-content: flex-end; gap: 8px; }

    /* ── ENTRIES ── */
    .entry-list { display: flex; flex-direction: column; gap: 3px; }

    .entry-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
      transition: background .1s; cursor: default;
    }
    .entry-row:hover { background: var(--surface2); }

    .entry-title {
      flex: 1; font-size: 16px; font-weight: 600; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .cat-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .cat-badge svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 6px; border-radius: 8px;
      display: flex; align-items: center; transition: all .15s; flex-shrink: 0;
    }
    .del-btn:hover { background: #ff5c7220; color: var(--danger); }
    .del-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .empty-state {
      text-align: center; padding: 64px 24px; color: var(--text-muted);
    }
    .empty-state svg { width: 40px; height: 40px; stroke: var(--border); fill: none; stroke-width: 1.5; display: block; margin: 0 auto 14px; }
    .empty-state p { font-size: 16px; }

    /* ── AUTH ── */
    .auth-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 13px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      transition: all .15s; font-family: inherit; white-space: nowrap; flex-shrink: 0;
    }
    .auth-btn:hover { border-color: var(--accent); color: var(--text); }
    .auth-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .auth-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .owner-only { display: none; }
    .owner-only.visible { display: flex; }
    button.owner-only.visible { display: flex; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; right: 20px; left: 20px; max-width: 320px; margin: 0 auto;
      background: var(--accent); color: #fff; padding: 12px 20px; border-radius: 12px;
      font-size: 15px; font-weight: 600; text-align: center;
      opacity: 0; transform: translateY(10px); transition: all .25s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
    </div>
    <span class="logo-text">Media Tracker</span>
  </div>
  <div class="header-right">
    <div class="sync-dot syncing" id="syncDot"></div>
    <!-- Auth button -->
    <button class="auth-btn" id="authBtn" onclick="handleAuthClick()">
      <svg id="authBtnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span id="authBtnLabel">Sign in</span>
    </button>
    <!-- ⋮ menu -->
    <div class="menu-wrap">
      <button class="btn-icon" id="menuBtn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
      </button>
      <div class="dropdown" id="menuDropdown">
        <button class="dropdown-item" onclick="exportCSV()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
    </div>
    <!-- Add entry — owner only -->
    <button class="btn btn-primary btn-add owner-only" id="addEntryBtn" onclick="toggleForm()">
      <svg viewBox="0 0 24 24" class="btn-add"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span class="btn-add-label">Log Entry</span>
    </button>
  </div>
</header>

<div class="container">

  <!-- ADD FORM -->
  <div class="add-form" id="addForm">
    <div class="form-title">New Entry</div>
    <div class="form-row">
      <div>
        <label>Title</label>
        <input id="inputTitle" type="text" placeholder="e.g. Dune: Part Two" />
      </div>
      <div>
        <label>Year</label>
        <input id="inputYear" type="number" min="1900" max="2099" />
      </div>
    </div>
    <label>Category</label>
    <div class="cat-pills" id="typePills"></div>
    <div class="custom-row" id="customRow">
      <input id="customCatInput" type="text" placeholder="Category name…" style="flex:1" />
      <button class="btn btn-primary" onclick="confirmCustomCat()">Add</button>
      <button class="btn btn-ghost" onclick="cancelCustomCat()">Cancel</button>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="toggleForm()">Cancel</button>
      <button class="btn btn-primary" onclick="addEntry()">Save Entry</button>
    </div>
  </div>

  <!-- YEAR NAV -->
  <div class="year-nav">
    <button class="year-nav-btn" onclick="changeYear(-1)">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="year-display" id="yearDisplay"></div>
    <button class="year-nav-btn" onclick="changeYear(1)" id="nextYearBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <!-- Category filter dropdown -->
    <div class="cat-filter-wrap menu-wrap">
      <button class="cat-filter-btn" id="catFilterBtn">
        <svg id="catFilterIcon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span id="catFilterLabel">All Categories</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dropdown" id="catDropdown" style="min-width:200px"></div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input class="search-input-field" id="searchInput" type="text" placeholder="Search…" oninput="renderEntries()" />
      <button class="btn-icon" id="searchToggle">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-line" id="statsLine"></div>

  <!-- ENTRIES -->
  <div id="entriesList"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── Firebase ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyArOMqSQL04Dd7ff_8g_G9872tXO9XkiAc",
    authDomain: "media-tracker-a00cf.firebaseapp.com",
    projectId: "media-tracker-a00cf",
    storageBucket: "media-tracker-a00cf.firebasestorage.app",
    messagingSenderId: "839766001354",
    appId: "1:839766001354:web:4520dfe872f4039aac9633"
  };
  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  const auth = firebase.auth();
  const col  = db.collection('entries');

  // ── Owner config ──────────────────────────────────────────
  const OWNER_EMAIL = 'gabriel.jacobi@gmail.com';
  let isOwner = false;

  // ── Auth state ────────────────────────────────────────────
  auth.onAuthStateChanged(user => {
    isOwner = !!(user && user.email === OWNER_EMAIL);
    updateAuthUI(user);
    renderAll();
  });

  function updateAuthUI(user) {
    const btn   = document.getElementById('authBtn');
    const label = document.getElementById('authBtnLabel');
    const icon  = document.getElementById('authBtnIcon');
    const addBtn = document.getElementById('addEntryBtn');

    if (user) {
      label.textContent = isOwner ? 'Signed in' : user.displayName || 'Signed in';
      if (user.photoURL) {
        icon.outerHTML = `<img src="${user.photoURL}" class="auth-avatar" id="authBtnIcon" />`;
      }
      if (isOwner) {
        addBtn.classList.add('visible');
        btn.title = 'Sign out';
      }
    } else {
      label.textContent = 'Sign in';
      addBtn.classList.remove('visible');
      // restore icon if it was replaced by avatar
      const imgEl = document.getElementById('authBtnIcon');
      if (imgEl && imgEl.tagName === 'IMG') {
        imgEl.outerHTML = `<svg id="authBtnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
      }
    }
  }

  function handleAuthClick() {
    const user = auth.currentUser;
    if (user) {
      if (confirm('Sign out?')) auth.signOut();
    } else {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        showToast('Sign-in failed. Check popup blocker.');
        console.error(err);
      });
    }
  }

  // ── Icons ─────────────────────────────────────────────────
  const IC = {
    movies:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>`,
    tv:         `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="15" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>`,
    book:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
    gamepad:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="17" y2="13"/><path d="M9.45 5.28A2 2 0 0 1 11.4 4h1.2a2 2 0 0 1 1.95 1.28l1.03 2.76A2 2 0 0 0 17.54 9.3l.53.13A2 2 0 0 1 19.5 11.33V14a2 2 0 0 1-2 2h-11a2 2 0 0 1-2-2v-2.67a2 2 0 0 1 1.43-1.91l.53-.13a2 2 0 0 0 1.96-1.26z"/></svg>`,
    headphones: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg>`,
    mic:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
    scroll:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/></svg>`,
    music:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
    tag:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>`,
    list:       `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
    check:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  };

  // ── Built-in categories ───────────────────────────────────
  const BUILT_IN = [
    { id: 'Movies',      label: 'Movies',      color: '#ff7a45', icon: IC.movies },
    { id: 'TV Shows',    label: 'TV Shows',    color: '#1890ff', icon: IC.tv },
    { id: 'Books',       label: 'Books',       color: '#52c41a', icon: IC.book },
    { id: 'Video Games', label: 'Video Games', color: '#722ed1', icon: IC.gamepad },
    { id: 'Audiobooks',  label: 'Audiobooks',  color: '#7c6cff', icon: IC.headphones },
    { id: 'Podcasts',    label: 'Podcasts',    color: '#faad14', icon: IC.mic },
    { id: 'Comics',      label: 'Comics',      color: '#13c2c2', icon: IC.scroll },
    { id: 'Concerts',    label: 'Concerts',    color: '#fa541c', icon: IC.music },
  ];

  // ── State ─────────────────────────────────────────────────
  let entries      = [];
  let customCats   = JSON.parse(localStorage.getItem('customCats') || '[]');
  let selectedCat  = BUILT_IN[0].id;
  let activeFilter = 'All';
  let selectedYear = new Date().getFullYear();
  let searchOpen   = false;

  function allCats() {
    return [...BUILT_IN, ...customCats.map(c => ({ id: c, label: c, color: '#8888aa', icon: IC.tag }))];
  }
  function catMeta(id) {
    return allCats().find(c => c.id === id) || { id, label: id, color: '#8888aa', icon: IC.tag };
  }
  function getYear(e) {
    if (e.year) return parseInt(e.year);
    if (e.date) return parseInt(e.date.split('-')[0]);
    return 0;
  }

  // ── Boot ──────────────────────────────────────────────────
  document.getElementById('yearDisplay').textContent = selectedYear;
  document.getElementById('inputYear').value = selectedYear;
  buildTypePills();
  buildCatDropdown();
  updateNextYearBtn();

  function setSyncStatus(s) { document.getElementById('syncDot').className = 'sync-dot ' + s; }

  setSyncStatus('syncing');
  col.orderBy('createdAt', 'desc').onSnapshot(
    snap => {
      entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setSyncStatus('synced');
      renderAll();
    },
    err => { setSyncStatus('error'); console.error(err); }
  );

  // ── Year nav ──────────────────────────────────────────────
  function changeYear(delta) {
    const next = selectedYear + delta;
    if (next > new Date().getFullYear()) return;
    selectedYear = next;
    document.getElementById('yearDisplay').textContent = selectedYear;
    document.getElementById('inputYear').value = selectedYear;
    updateNextYearBtn();
    renderAll();
  }
  function updateNextYearBtn() {
    const btn = document.getElementById('nextYearBtn');
    btn.style.opacity = selectedYear >= new Date().getFullYear() ? '.3' : '1';
    btn.style.pointerEvents = selectedYear >= new Date().getFullYear() ? 'none' : 'auto';
  }

  // ── Category filter dropdown ──────────────────────────────
  function buildCatDropdown() {
    const dd = document.getElementById('catDropdown');
    const cats = [{ id: 'All', label: 'All Categories', color: null, icon: IC.list }, ...allCats()];
    dd.innerHTML = cats.map(c => `
      <button class="dropdown-item${c.id === activeFilter ? ' selected' : ''}" onclick="selectCatFilter('${c.id}')">
        ${c.icon}
        ${c.label}
        ${c.id === activeFilter ? `<span style="margin-left:auto">${IC.check}</span>` : ''}
      </button>
    `).join('');
  }

  function selectCatFilter(id) {
    activeFilter = id;
    const meta = id === 'All' ? { label: 'All Categories', icon: IC.list, color: null } : catMeta(id);
    document.getElementById('catFilterLabel').textContent = meta.label;
    const iconEl = document.getElementById('catFilterIcon');
    const tmp = document.createElement('div');
    tmp.innerHTML = meta.icon;
    const newSvg = tmp.firstChild;
    newSvg.setAttribute('id', 'catFilterIcon');
    newSvg.setAttribute('width', '15');
    newSvg.setAttribute('height', '15');
    iconEl.replaceWith(newSvg);
    closeCatDropdown();
    buildCatDropdown();
    renderEntries();
  }

  document.getElementById('catFilterBtn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('catDropdown');
    const btn = document.getElementById('catFilterBtn');
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) { dd.classList.add('open'); btn.classList.add('open'); }
  });
  function closeCatDropdown() {
    document.getElementById('catDropdown').classList.remove('open');
    document.getElementById('catFilterBtn').classList.remove('open');
  }

  // ── Search toggle ─────────────────────────────────────────
  document.getElementById('searchToggle').addEventListener('click', () => {
    searchOpen = !searchOpen;
    const inp = document.getElementById('searchInput');
    inp.classList.toggle('open', searchOpen);
    if (searchOpen) { inp.focus(); }
    else { inp.value = ''; renderEntries(); }
  });

  // ── ⋮ menu ────────────────────────────────────────────────
  document.getElementById('menuBtn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('menuDropdown');
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) dd.classList.add('open');
  });

  function closeAllDropdowns() {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    document.getElementById('catFilterBtn').classList.remove('open');
  }
  document.addEventListener('click', closeAllDropdowns);

  // ── Form ──────────────────────────────────────────────────
  function toggleForm() {
    const form = document.getElementById('addForm');
    const open = form.classList.contains('open');
    form.classList.toggle('open', !open);
    if (!open) { document.getElementById('inputTitle').focus(); buildTypePills(); }
  }

  function buildTypePills() {
    const wrap = document.getElementById('typePills');
    wrap.innerHTML = allCats().map(c => {
      const active = c.id === selectedCat;
      return `<div class="cat-pill${active ? ' active' : ''}" data-cat="${c.id}"
        style="${active ? `background:${c.color};border-color:${c.color}` : ''}">${c.icon} ${c.label}</div>`;
    }).join('') +
    `<div class="cat-pill add-pill" id="addCustomBtn">${IC.tag} Custom…</div>`;

    wrap.querySelectorAll('.cat-pill[data-cat]').forEach(p =>
      p.addEventListener('click', () => { selectedCat = p.dataset.cat; buildTypePills(); })
    );
    document.getElementById('addCustomBtn').addEventListener('click', () => {
      document.getElementById('customRow').classList.add('open');
      document.getElementById('customCatInput').focus();
    });
  }

  function confirmCustomCat() {
    const val = document.getElementById('customCatInput').value.trim();
    if (!val) return;
    if (!customCats.includes(val) && !BUILT_IN.find(c => c.id === val)) {
      customCats.push(val);
      localStorage.setItem('customCats', JSON.stringify(customCats));
    }
    selectedCat = val;
    cancelCustomCat();
    buildTypePills();
    buildCatDropdown();
  }
  function cancelCustomCat() {
    document.getElementById('customRow').classList.remove('open');
    document.getElementById('customCatInput').value = '';
  }
  document.getElementById('customCatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmCustomCat();
    if (e.key === 'Escape') cancelCustomCat();
  });

  async function addEntry() {
    const title = document.getElementById('inputTitle').value.trim();
    const year  = parseInt(document.getElementById('inputYear').value) || selectedYear;
    if (!title) { showToast('Please enter a title.'); return; }
    setSyncStatus('syncing');
    try {
      await col.add({ title, year, type: selectedCat, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputYear').value = selectedYear;
      toggleForm();
      showToast('Saved!');
    } catch(e) {
      setSyncStatus('error');
      showToast('Error saving — check connection.');
      console.error(e);
    }
  }
  document.getElementById('inputTitle').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

  // ── Delete ────────────────────────────────────────────────
  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    try { await col.doc(id).delete(); showToast('Deleted.'); }
    catch(e) { showToast('Error deleting.'); }
  }

  // ── Render ────────────────────────────────────────────────
  function renderAll() { renderStats(); renderEntries(); buildCatDropdown(); }

  function renderStats() {
    const yearEntries = entries.filter(e => getYear(e) === selectedYear);
    const el = document.getElementById('statsLine');
    if (!yearEntries.length) { el.innerHTML = ''; return; }
    let html = `<span class="total">${yearEntries.length} ${yearEntries.length === 1 ? 'entry' : 'entries'}</span>`;
    allCats().forEach(c => {
      const n = yearEntries.filter(e => e.type === c.id).length;
      if (n > 0) html += `<span style="color:${c.color}">${c.icon} ${n} ${c.label}</span>`;
    });
    el.innerHTML = html;
  }

  function renderEntries() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const el = document.getElementById('entriesList');

    let filtered = entries.filter(e => {
      const matchYear = getYear(e) === selectedYear;
      const matchCat  = activeFilter === 'All' || e.type === activeFilter;
      const matchSearch = !search || (e.title || '').toLowerCase().includes(search);
      return matchYear && matchCat && matchSearch;
    });

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>${entries.filter(e => getYear(e) === selectedYear).length === 0
          ? `Nothing logged for ${selectedYear} yet.`
          : 'No entries match your filter.'}</p>
      </div>`;
      return;
    }

    // Sort alphabetically by title
    filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));

    el.innerHTML = `<div class="entry-list">${filtered.map(e => {
      const meta = catMeta(e.type);
      // isOwner is a closure variable from auth state
      return `<div class="entry-row">
        <div class="entry-title">${escHtml(e.title)}</div>
        <div class="cat-badge" style="background:${meta.color}1a;color:${meta.color}">${meta.icon} ${meta.label}</div>
        <button class="del-btn owner-only${isOwner ? ' visible' : ''}" onclick="deleteEntry('${e.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('')}</div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    closeAllDropdowns();
    if (!entries.length) { showToast('Nothing to export yet.'); return; }
    const rows = entries.map(e => [`"${(e.title||'').replace(/"/g,'""')}"`, getYear(e), e.type].join(','));
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['Title,Year,Category\n' + rows.join('\n')], { type: 'text/csv' }));
    a.download = `media-log-${selectedYear}.csv`;
    a.click();
    showToast('CSV exported!');
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
