<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Media Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #7c6cff;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --danger: #ff5c72;
      --radius: 12px;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -moz-appearance: none;
    }

    svg { display: block; flex-shrink: 0; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 10px;
    }

    .logo { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .logo-icon {
      width: 34px; height: 34px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-icon svg { width: 17px; height: 17px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0; transition: background .3s;
    }
    .sync-dot.synced  { background: #52c41a; }
    .sync-dot.syncing { background: #faad14; animation: blink 1s infinite; }
    .sync-dot.error   { background: var(--danger); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

    /* ── BUTTONS ── */
    button { touch-action: manipulation; }

    .btn {
      border: none; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity .15s; border-radius: 10px;
      font-size: 15px; font-weight: 600; -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { opacity: .82; }
    .btn-primary { background: var(--accent); color: #fff; padding: 10px 16px; }
    .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); padding: 10px 16px; }
    .btn-icon {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); padding: 9px 10px; border-radius: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
    }
    .btn-icon:hover { opacity: .8; }
    .btn-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .btn-add svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .btn-add-label {}
    @media (max-width: 400px) {
      .btn-add-label { display: none; }
      .btn-primary.btn-add { padding: 10px 11px; }
    }

    /* ── DROPDOWN ── */
    .menu-wrap { position: relative; }
    .dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 8px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px; min-width: 190px;
      z-index: 200; box-shadow: 0 12px 32px #000a;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-radius: 8px; font-size: 15px;
      color: var(--text-muted); cursor: pointer; transition: background .12s;
      border: none; background: none; width: 100%; text-align: left;
      font-family: inherit; -webkit-tap-highlight-color: transparent;
    }
    .dropdown-item:hover, .dropdown-item.selected { background: var(--surface2); color: var(--text); }
    .dropdown-item.selected { color: var(--accent); }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:hover { background: #ff5c7215; }
    .dropdown-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .dropdown-sep { height: 1px; background: var(--border); margin: 4px 6px; }

    /* ── MAIN ── */
    .container { max-width: 700px; margin: 0 auto; padding: 0 16px; }

    /* ── AUTH ERROR ── */
    .auth-error {
      background: #ff5c7215; border: 1px solid var(--danger);
      border-radius: 10px; padding: 12px 16px; margin-top: 16px;
      font-size: 14px; color: var(--danger); line-height: 1.5; display: none;
    }
    .auth-error.visible { display: block; }
    .auth-error code { background: #ff5c7225; padding: 2px 6px; border-radius: 4px; font-size: 13px; }

    /* ── YEAR NAV ── */
    .year-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0 14px; gap: 10px;
    }
    .year-dropdown-wrap { position: relative; }
    .year-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; cursor: pointer;
      font-family: inherit; color: var(--text); padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .year-label { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .year-btn .chevron { width: 20px; height: 20px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .year-btn.open .chevron { transform: rotate(180deg); }
    .year-dropdown { left: 0; right: auto; min-width: 130px; max-height: 280px; overflow-y: auto; }
    .year-dropdown .dropdown-item { font-size: 16px; font-weight: 600; justify-content: space-between; }

    /* ── ADD ENTRY BUTTON in year bar ── */
    .owner-only { display: none !important; }
    .owner-only.visible { display: flex !important; }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 10px; padding-bottom: 14px; }

    .cat-filter-wrap { position: relative; }
    .cat-filter-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 13px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--text-muted);
      transition: all .15s; font-family: inherit; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-filter-btn:hover, .cat-filter-btn.open { border-color: var(--accent); color: var(--text); }
    .cat-filter-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .cat-filter-btn .chevron { width: 14px; height: 14px; opacity: .5; transition: transform .2s; }
    .cat-filter-btn.open .chevron { transform: rotate(180deg); }

    .search-wrap { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 8px; min-width: 0; overflow: hidden; }
    .search-input-field {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 16px;
      padding: 10px 13px; outline: none; font-family: inherit;
      max-width: 0; min-width: 0; width: 100%;
      opacity: 0; transition: max-width .25s ease, opacity .2s, border-color .15s;
      pointer-events: none; -webkit-appearance: none;
    }
    .search-input-field.open { max-width: 200px; opacity: 1; pointer-events: all; }
    @media (max-width: 400px) { .search-input-field.open { max-width: 140px; } }
    .search-input-field:focus { border-color: var(--accent); }

    /* ── STATS ── */
    .stats-line {
      font-size: 14px; color: var(--text-muted);
      padding-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .stats-line span { display: flex; align-items: center; gap: 5px; }
    .stats-line svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .stats-line .total { font-weight: 700; color: var(--text); }

    /* ── ADD FORM ── */
    .add-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: none;
    }
    .add-form.open { display: block; }
    .form-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-muted); margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 7px; }
    input[type=text], input[type=number] {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 16px;
      padding: 12px 14px; outline: none; transition: border-color .15s;
      font-family: inherit; width: 100%; -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 110px; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 400px) { .form-row { grid-template-columns: 1fr; } }

    .cat-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cat-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: 2px solid transparent;
      background: var(--surface2); color: var(--text-muted); transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-pill svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .cat-pill.active { color: #fff; }
    .cat-pill.add-pill { border-style: dashed; border-color: var(--border); }
    .cat-pill.add-pill:hover { border-color: var(--accent); color: var(--accent); }

    .custom-row { display: none; align-items: center; gap: 8px; margin-bottom: 16px; }
    .custom-row.open { display: flex; }
    .custom-row input { font-size: 15px; padding: 10px 13px; }
    .custom-row .btn { padding: 10px 14px; font-size: 14px; }

    .form-actions { display: flex; justify-content: flex-end; gap: 8px; }

    /* ── GROUPED ENTRIES ── */
    .cat-group { margin-bottom: 24px; }
    .cat-group-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .cat-group-header svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .cat-group-header .cat-count {
      margin-left: auto; font-size: 12px; font-weight: 600;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1px 8px;
    }

    .entry-list { display: flex; flex-direction: column; gap: 3px; }
    .entry-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 15px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      transition: background .1s;
    }
    .entry-row:hover { background: var(--surface2); }
    .entry-row.draggable { cursor: grab; }
    .entry-row.dragging { opacity: 0.5; background: var(--surface2); }
    .entry-row.drag-over { border-color: var(--accent); border-width: 2px; }

    /* Hide drag handle and delete when editing title */
    .entry-row.editing-title .drag-handle { display: none; }
    .entry-row.editing-title .delete-btn { display: none; }
    .entry-title { flex: 1; font-size: 16px; font-weight: 500; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 5px; border-radius: 7px;
      display: flex; align-items: center; transition: all .15s; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .del-btn:hover { background: #ff5c7220; color: var(--danger); }
    .del-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
    .empty-state svg { width: 38px; height: 38px; stroke: var(--border); fill: none; stroke-width: 1.5; display: block; margin: 0 auto 14px; stroke-linecap: round; stroke-linejoin: round; }
    .empty-state p { font-size: 16px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--accent); color: #fff; padding: 12px 22px; border-radius: 12px;
      font-size: 15px; font-weight: 600; white-space: nowrap;
      opacity: 0; transition: all .25s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
    </div>
    <span class="logo-text">Media Tracker</span>
  </div>
  <div class="header-right">
    <div class="sync-dot syncing" id="syncDot"></div>
    <!-- Kebab menu -->
    <div class="menu-wrap">
      <button class="btn-icon" id="menuBtn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1" fill="currentColor" stroke="none"/></svg>
      </button>
      <div class="dropdown" id="menuDropdown">
        <!-- Signed-in email label — shown only when signed in -->
        <div id="authEmailRow" style="display:none;padding:8px 14px 4px;font-size:12px;color:var(--text-muted);word-break:break-all"></div>
        <!-- Auth item — updated dynamically -->
        <button class="dropdown-item" id="authMenuItem" onclick="handleAuthClick()">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="authMenuLabel">Sign in</span>
        </button>
        <button class="dropdown-item owner-only" id="editModeBtn" onclick="toggleEditMode()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span id="editModeLabel">Edit</span>
        </button>
        <button class="dropdown-item owner-only" id="catManagerBtn" onclick="openCategories()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="1"/><circle cx="7" cy="12" r="1"/><circle cx="7" cy="17" r="1"/><line x1="12" y1="6" x2="20" y2="6"/><line x1="12" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>
          <span>Manage Categories</span>
        </button>
        <div class="dropdown-sep"></div>
        <button class="dropdown-item" onclick="exportCSV()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
    </div>
    <!-- Add entry — owner only -->
    <button class="btn btn-primary btn-add owner-only" id="addEntryBtn" onclick="toggleForm()">
      <svg viewBox="0 0 24 24" class="btn-add"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span class="btn-add-label">Log Entry</span>
    </button>
  </div>
</header>

<div class="container">

  <div class="auth-error" id="authError"></div>

  <!-- ADD FORM -->
  <div class="add-form" id="addForm">
    <div class="form-title">New Entry</div>
    <div class="form-row">
      <div>
        <label>Title</label>
        <input id="inputTitle" type="text" placeholder="e.g. Dune: Part Two" />
      </div>
      <div>
        <label>Year</label>
        <input id="inputYear" type="number" min="1900" max="2099" />
      </div>
    </div>
    <label>Category</label>
    <div class="cat-pills" id="typePills"></div>
    <div class="custom-row" id="customRow">
      <input id="customCatInput" type="text" placeholder="Category name…" style="flex:1" />
      <button class="btn btn-primary" onclick="confirmCustomCat()">Add</button>
      <button class="btn btn-ghost" onclick="cancelCustomCat()">Cancel</button>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="toggleForm()">Cancel</button>
      <button class="btn btn-primary" onclick="addEntry()">Save Entry</button>
    </div>
  </div>

  <!-- YEAR BAR -->
  <div class="year-bar">
    <div class="year-dropdown-wrap menu-wrap">
      <button class="year-btn" id="yearBtn">
        <span class="year-label" id="yearLabel"></span>
        <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dropdown year-dropdown" id="yearDropdown"></div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="cat-filter-wrap menu-wrap">
      <button class="cat-filter-btn" id="catFilterBtn">
        <svg id="catFilterIcon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span id="catFilterLabel">All Categories</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dropdown" id="catDropdown" style="min-width:210px;left:0;right:auto;max-width:calc(100vw - 32px)"></div>
    </div>
    <div class="search-wrap">
      <input class="search-input-field" id="searchInput" type="text" placeholder="Search…" oninput="renderEntries()" />
      <button class="btn-icon" id="searchToggle">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <div class="stats-line" id="statsLine"></div>
  <div id="entriesList"></div>

</div>

<!-- Icon Picker Modal -->
<div id="iconPickerModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1001;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:400px;width:90%">
    <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Pick Icon</h3>
    <div id="iconGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:8px;margin-bottom:16px"></div>
    <button class="btn btn-ghost" onclick="document.getElementById('iconPickerModal').style.display='none'" style="width:100%">Cancel</button>
  </div>
</div>

<!-- Category Manager Modal -->
<div id="catManagerModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-height:80vh;overflow-y:auto;max-width:500px;width:90%">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Manage Categories</h2>
    <div id="catManagerList" style="margin-bottom:20px;max-height:300px;overflow-y:auto"></div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input id="newCatName" type="text" placeholder="New category name" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:inherit">
      <button class="btn btn-primary" onclick="addNewCategory()" style="white-space:nowrap">Add Category</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="cancelCategoryChanges()" style="flex:1">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategoryChanges()" style="flex:1">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Firebase ──────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyArOMqSQL04Dd7ff_8g_G9872tXO9XkiAc",
    authDomain: "media-tracker-a00cf.firebaseapp.com",
    projectId: "media-tracker-a00cf",
    storageBucket: "media-tracker-a00cf.firebasestorage.app",
    messagingSenderId: "839766001354",
    appId: "1:839766001354:web:4520dfe872f4039aac9633"
  };
  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  const auth = firebase.auth();
  const col  = db.collection('entries');

  // ── Icons (Google Material Icons) ─────────────────────────
  const IC = {
    movies:      `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 3H6c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H6V5h12v14zM9 7h6v2H9zm0 4h6v2H9zm0 4h4v2H9z"/></svg>`,
    tv:          `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/></svg>`,
    book:        `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-4 14H8v-2h6v2zm4-5H6V5h12v6z"/></svg>`,
    gamepad:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 5h-2v4H7v2h4v4h2v-4h4v-2h-4V5zm6-1h-1V2h-2v2h-1v2h1v1h2V4h1V4z"/></svg>`,
    audiobooks:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.82 2 11.5S6.48 20 12 20s10-3.82 10-8.5S17.52 3 12 3zm0 15c-3.59 0-6.5-2.69-6.5-6s2.91-6 6.5-6 6.5 2.69 6.5 6-2.91 6-6.5 6zm3.5-9c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"/></svg>`,
    podcasts:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm0-6c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0-3C6.48 5 2 8.82 2 13.5S6.48 22 12 22s10-3.82 10-8.5S17.52 5 12 5zm0 16c-3.59 0-6.5-2.69-6.5-6s2.91-6 6.5-6 6.5 2.69 6.5 6-2.91 6-6.5 6z"/></svg>`,
    comics:      `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8l-2 2V4h14v12z"/></svg>`,
    theatre:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 2V7c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2z"/></svg>`,
    concerts:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v9.28c-.47-.29-.99-.48-1.5-.48C9.01 11.8 8 12.81 8 14c0 1.19 1.01 2.2 2.5 2.2s2.5-1.01 2.5-2.2V6h4V3h-5z"/></svg>`,
    standup:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>`,
    tag:         `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5c-1.66 0-3 1.34-3 3v9c0 1.66 1.34 3 3 3h11c.67 0 1.27-.33 1.63-.84L22 12 17.63 5.84zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>`,
    list:        `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>`,
    check:       `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`,
    signout:     `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>`,
  };

  // ── Category Colors & Icons ───────────────────────────────
  const CAT_COLORS = ['#ff7a45', '#1890ff', '#52c41a', '#722ed1', '#7c6cff', '#faad14', '#13c2c2', '#fa541c', '#f5222d', '#eb2f96'];
  const CAT_ICONS = {
    movies: IC.movies, tv: IC.tv, book: IC.book, gamepad: IC.gamepad, audiobooks: IC.audiobooks,
    podcasts: IC.podcasts, comics: IC.comics, theatre: IC.theatre, concerts: IC.concerts, standup: IC.standup,
    tag: IC.tag, list: IC.list, check: IC.check, signout: IC.signout
  };
  const CAT_ICON_KEYS = Object.keys(CAT_ICONS);

  // ── Categories ────────────────────────────────────────────
  const DEFAULT_CATS = [
    { id: 'Movies',      label: 'Movies',      color: '#ff7a45', icon: IC.movies, iconKey: 'movies', isBuiltIn: true },
    { id: 'TV Shows',    label: 'TV Shows',    color: '#1890ff', icon: IC.tv, iconKey: 'tv', isBuiltIn: true },
    { id: 'Books',       label: 'Books',       color: '#52c41a', icon: IC.book, iconKey: 'book', isBuiltIn: true },
    { id: 'Video Games', label: 'Video Games', color: '#722ed1', icon: IC.gamepad, iconKey: 'gamepad', isBuiltIn: true },
    { id: 'Audiobooks',  label: 'Audiobooks',  color: '#7c6cff', icon: IC.audiobooks, iconKey: 'audiobooks', isBuiltIn: true },
    { id: 'Podcasts',    label: 'Podcasts',    color: '#faad14', icon: IC.podcasts, iconKey: 'podcasts', isBuiltIn: true },
    { id: 'Comics',      label: 'Comics',      color: '#13c2c2', icon: IC.comics, iconKey: 'comics', isBuiltIn: true },
    { id: 'Theatre',     label: 'Theatre',     color: '#fa541c', icon: IC.theatre, iconKey: 'theatre', isBuiltIn: true },
    { id: 'Concerts',    label: 'Concerts',    color: '#f5222d', icon: IC.concerts, iconKey: 'concerts', isBuiltIn: true },
    { id: 'Stand-up',    label: 'Stand-up',    color: '#eb2f96', icon: IC.standup, iconKey: 'standup', isBuiltIn: true },
  ];

  // ── State ─────────────────────────────────────────────────
  let entries      = [];
  let allCategoriesData = loadAllCategories();
  let selectedCat  = DEFAULT_CATS[0].id;
  let activeFilter = 'All';
  let selectedYear = new Date().getFullYear();
  let isOwner      = false;
  let currentUser  = null;
  let editMode     = false;
  let draggedEntry = null;

  function loadAllCategories() {
    const stored = JSON.parse(localStorage.getItem('allCategories') || '{}');
    const legacy = JSON.parse(localStorage.getItem('customCats') || '[]');

    // Migrate legacy custom categories if needed
    let customCats = [];
    if (Array.isArray(legacy) && legacy.length > 0) {
      if (typeof legacy[0] === 'string') {
        customCats = legacy.map((name, idx) => ({
          id: name,
          label: name,
          color: CAT_COLORS[idx % CAT_COLORS.length],
          iconKey: 'tag',
          isBuiltIn: false
        }));
      } else {
        customCats = legacy.map((cat, idx) => ({
          ...cat,
          iconKey: cat.iconKey || 'tag',
          isBuiltIn: false
        }));
      }
    }

    // Merge with defaults
    let merged = DEFAULT_CATS.map(def => stored[def.id] || def);
    merged.push(...customCats);
    return merged;
  }

  function saveAllCategories() {
    const toStore = {};
    allCategoriesData.forEach(cat => {
      if (cat.isBuiltIn || allCategoriesData.filter(c => !c.isBuiltIn).includes(cat)) {
        toStore[cat.id] = cat;
      }
    });
    localStorage.setItem('allCategories', JSON.stringify(toStore));
  }

  function allCats() {
    return allCategoriesData.map(cat => ({
      ...cat,
      icon: CAT_ICONS[cat.iconKey] || IC.tag
    }));
  }
  function catMeta(id) {
    return allCats().find(c => c.id === id) || { id, label: id, color: '#8888aa', icon: IC.tag };
  }
  function getYear(e) {
    if (e.year) return parseInt(e.year);
    if (e.date) return parseInt(e.date.split('-')[0]);
    return 0;
  }
  function getTimestamp(e) {
    if (e.createdAt && e.createdAt.toMillis) return e.createdAt.toMillis();
    if (e.createdAt && e.createdAt.seconds) return e.createdAt.seconds * 1000;
    return 0;
  }

  // ── Boot ──────────────────────────────────────────────────
  document.getElementById('yearLabel').textContent = selectedYear;
  document.getElementById('inputYear').value = selectedYear;
  buildTypePills();
  buildCatDropdown();

  function setSyncStatus(s) { document.getElementById('syncDot').className = 'sync-dot ' + s; }
  setSyncStatus('syncing');

  col.orderBy('createdAt', 'asc').onSnapshot(
    snap => {
      entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setSyncStatus('synced');
      renderAll();
    },
    err => { setSyncStatus('error'); console.error(err); }
  );

  // ── Auth ──────────────────────────────────────────────────
  const OWNER_EMAIL = 'gabriel.jacobi@gmail.com';

  // Always check for a pending redirect result on load (handles Chrome Android
  // fallback and any browser where popup navigated the tab instead of opening one)
  auth.getRedirectResult().then(result => {
    if (result && result.user) {
      console.log('✓ Redirect sign-in completed:', result.user.email);
      // Explicitly update auth state (don't rely on onAuthStateChanged alone)
      currentUser = result.user;
      isOwner = result.user.email === OWNER_EMAIL;
      updateAuthUI(result.user);
      renderAll();
    } else {
      console.log('getRedirectResult: no pending redirect (result is null or missing user)');
      // Fallback: check if user is already signed in (handles Chrome Custom Tabs edge case)
      if (auth.currentUser) {
        console.log('✓ User is signed in via auth.currentUser:', auth.currentUser.email);
        currentUser = auth.currentUser;
        isOwner = auth.currentUser.email === OWNER_EMAIL;
        updateAuthUI(auth.currentUser);
        renderAll();
      }
    }
  }).catch(err => {
    console.error('✗ getRedirectResult error:', err.code, err.message);
    showAuthError('Sign-in failed (' + (err.code || 'unknown error') + '). Try again.');
  });

  auth.onAuthStateChanged(user => {
    currentUser = user;
    isOwner = !!(user && user.email === OWNER_EMAIL);
    updateAuthUI(user);
    renderAll();
  });

  function updateAuthUI(user) {
    const label    = document.getElementById('authMenuLabel');
    const menuBtn  = document.getElementById('authMenuItem');
    const addBtn   = document.getElementById('addEntryBtn');
    const emailRow = document.getElementById('authEmailRow');

    if (user) {
      if (emailRow) { emailRow.style.display = 'block'; emailRow.textContent = user.email || ''; }
      if (label) label.textContent = 'Sign out';
      if (menuBtn) {
        menuBtn.innerHTML = `${IC.signout} <span>Sign out</span>`;
        menuBtn.classList.add('danger');
      }
      if (addBtn && isOwner) addBtn.classList.add('visible');
      const editBtn = document.getElementById('editModeBtn');
      if (editBtn && isOwner) editBtn.classList.add('visible');
      const catMgrBtn = document.getElementById('catManagerBtn');
      if (catMgrBtn && isOwner) catMgrBtn.classList.add('visible');
    } else {
      if (emailRow) emailRow.style.display = 'none';
      if (menuBtn) {
        menuBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <span>Sign in with Google</span>`;
        menuBtn.classList.remove('danger');
      }
      if (addBtn) addBtn.classList.remove('visible');
      const editBtn = document.getElementById('editModeBtn');
      if (editBtn) editBtn.classList.remove('visible');
      const catMgrBtn = document.getElementById('catManagerBtn');
      if (catMgrBtn) catMgrBtn.classList.remove('visible');
    }
  }

  function handleAuthClick() {
    closeAllDropdowns();
    if (currentUser) {
      if (confirm('Sign out?')) auth.signOut();
      return;
    }
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ 'prompt': 'select_account' });

    // Use popup on all platforms with triple-redundancy fallback
    auth.signInWithPopup(provider).then(result => {
      // Primary: popup completed successfully
      currentUser = result.user;
      isOwner = result.user && result.user.email === OWNER_EMAIL;
      updateAuthUI(result.user);
      renderAll();
    }).catch(err => {
      console.error('Popup error:', err);
      if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') {
        return; // user cancelled
      }
      // If popup fails, try redirect as fallback
      auth.signInWithRedirect(provider).catch(redirectErr => {
        showAuthError(redirectErr.code || redirectErr.message || 'Sign-in failed.');
        console.error('Redirect fallback error:', redirectErr);
      });
    });
  }

  // ── Kebab menu ────────────────────────────────────────────
  document.getElementById('menuBtn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('menuDropdown');
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) dd.classList.add('open');
  });

  // ── Year dropdown ─────────────────────────────────────────
  function availableYears() {
    const years = new Set(entries.map(e => getYear(e)));
    years.add(new Date().getFullYear());
    return [...years].filter(y => y > 0).sort((a, b) => b - a);
  }

  function buildYearDropdown() {
    const dd = document.getElementById('yearDropdown');
    const years = availableYears();
    dd.innerHTML = years.map(y => `
      <button class="dropdown-item${y === selectedYear ? ' selected' : ''}" onclick="selectYear(${y})">
        ${y} ${y === selectedYear ? IC.check : ''}
      </button>
    `).join('');
  }

  function selectYear(y) {
    selectedYear = y;
    activeFilter = 'All'; // reset category filter when switching years
    document.getElementById('yearLabel').textContent = y;
    document.getElementById('catFilterLabel').textContent = 'All Categories';
    document.getElementById('inputYear').value = y;
    closeAllDropdowns();
    renderAll();
  }

  document.getElementById('yearBtn').addEventListener('click', e => {
    e.stopPropagation();
    buildYearDropdown();
    const dd = document.getElementById('yearDropdown');
    const btn = document.getElementById('yearBtn');
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) { dd.classList.add('open'); btn.classList.add('open'); }
  });

  // ── Category filter ───────────────────────────────────────
  function buildCatDropdown() {
    const dd = document.getElementById('catDropdown');
    // Build from actual entry types so cross-device custom categories always appear
    const usedTypes = [...new Set(
      entries.filter(e => getYear(e) === selectedYear).map(e => e.type).filter(Boolean)
    )];
    // Sort by allCats order; unknowns (cross-device cats) go at the end alphabetically
    const order = allCats().map(c => c.id);
    usedTypes.sort((a, b) => {
      const ai = order.indexOf(a), bi = order.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
    const cats = [{ id: 'All', label: 'All Categories', color: null, icon: IC.list }, ...usedTypes.map(id => catMeta(id))];
    dd.innerHTML = cats.map(c => `
      <button class="dropdown-item${c.id === activeFilter ? ' selected' : ''}" onclick="selectCatFilter('${c.id}')">
        ${c.icon} ${c.label}
        ${c.id === activeFilter ? `<span style="margin-left:auto">${IC.check}</span>` : ''}
      </button>
    `).join('');
  }

  function selectCatFilter(id) {
    activeFilter = id;
    const meta = id === 'All' ? { label: 'All Categories', icon: IC.list } : catMeta(id);
    document.getElementById('catFilterLabel').textContent = meta.label;
    const old = document.getElementById('catFilterIcon');
    const tmp = document.createElement('div');
    tmp.innerHTML = meta.icon;
    const svg = tmp.firstChild;
    svg.setAttribute('id', 'catFilterIcon');
    svg.setAttribute('width', '15'); svg.setAttribute('height', '15');
    old.replaceWith(svg);
    closeCatDropdown();
    buildCatDropdown();
    renderEntries();
  }

  document.getElementById('catFilterBtn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('catDropdown');
    const btn = document.getElementById('catFilterBtn');
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) { dd.classList.add('open'); btn.classList.add('open'); }
  });
  function closeCatDropdown() {
    document.getElementById('catDropdown').classList.remove('open');
    document.getElementById('catFilterBtn').classList.remove('open');
  }

  // ── Search ────────────────────────────────────────────────
  document.getElementById('searchToggle').addEventListener('click', () => {
    const inp = document.getElementById('searchInput');
    const open = inp.classList.toggle('open');
    if (open) inp.focus(); else { inp.value = ''; renderEntries(); }
  });

  // ── Global close ──────────────────────────────────────────
  function closeAllDropdowns() {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    document.getElementById('catFilterBtn').classList.remove('open');
    document.getElementById('yearBtn').classList.remove('open');
  }
  document.addEventListener('click', closeAllDropdowns);

  // ── Category Manager ───────────────────────────────────────
  let categoryBackup = null;

  function openCategories() {
    closeAllDropdowns();
    // Create backup of current categories before any changes
    categoryBackup = JSON.parse(JSON.stringify(allCategoriesData));
    showCategoryList();
    showIconPicker();
    document.getElementById('catManagerModal').style.display = 'flex';
  }

  function cancelCategoryChanges() {
    // Restore from backup
    if (categoryBackup) {
      allCategoriesData = JSON.parse(JSON.stringify(categoryBackup));
    }
    // Close modal and reset
    document.getElementById('catManagerModal').style.display = 'none';
    document.getElementById('newCatName').value = '';
    categoryBackup = null;
    // Rebuild UI to reflect restored state
    buildTypePills();
    buildCatDropdown();
    renderEntries();
  }

  function saveCategoryChanges() {
    // Categories were already saved to localStorage by individual functions
    // Just close the modal and clear backup
    document.getElementById('catManagerModal').style.display = 'none';
    document.getElementById('newCatName').value = '';
    categoryBackup = null;
  }

  // Close modals when clicking on the backdrop
  document.getElementById('catManagerModal').addEventListener('click', (e) => {
    if (e.target.id === 'catManagerModal') {
      cancelCategoryChanges();
    }
  });

  document.getElementById('iconPickerModal').addEventListener('click', (e) => {
    if (e.target.id === 'iconPickerModal') {
      document.getElementById('iconPickerModal').style.display = 'none';
    }
  });

  function showIconPicker() {
    const searchInput = document.getElementById('iconSearchInput');
    if (!searchInput) {
      const picker = document.getElementById('iconPickerModal').querySelector('div > div');
      const search = document.createElement('input');
      search.id = 'iconSearchInput';
      search.type = 'text';
      search.placeholder = 'Search icons...';
      search.style.cssText = 'width:100%;padding:10px;margin-bottom:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit';
      search.addEventListener('input', showIconPicker);
      picker.insertBefore(search, picker.querySelector('#iconGrid'));
    }
    const query = (document.getElementById('iconSearchInput')?.value || '').toLowerCase();
    const filtered = CAT_ICON_KEYS.filter(key => key.includes(query));
    const grid = document.getElementById('iconGrid');
    grid.innerHTML = filtered.map(key => `
      <button onclick="selectIcon('${key}')" style="display:flex;align-items:center;justify-content:center;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;transition:all 0.2s;color:var(--text);font-size:20px" title="${key}">
        ${CAT_ICONS[key]}
      </button>
    `).join('');
  }

  function selectIcon(iconKey) {
    const catId = window.currentIconPickerCat;
    if (!catId) return;
    const cat = allCategoriesData.find(c => c.id === catId);
    if (!cat) return;
    cat.iconKey = iconKey;
    saveAllCategories();
    showCategoryList();
    buildTypePills();
    buildCatDropdown();
    renderEntries();
    document.getElementById('iconPickerModal').style.display = 'none';
    showToast('Icon updated');
  }

  function showCategoryList() {
    const list = document.getElementById('catManagerList');
    list.innerHTML = allCats().map(cat => `
      <div style="display:flex;align-items:center;gap:8px;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px">
        <div style="width:24px;height:24px;flex-shrink:0;color:var(--text);display:flex;align-items:center;justify-content:center">${cat.icon}</div>
        <span class="cat-name-display" data-id="${cat.id}" style="flex:1;font-weight:600">${escHtml(cat.label)}</span>
        <button class="btn-icon cat-edit-btn" data-id="${cat.id}" onclick="startEditCat('${cat.id}')" style="padding:6px 8px;flex-shrink:0" title="Rename">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/><path d="M20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </button>
        <button class="btn-icon" data-id="${cat.id}" onclick="openIconPicker('${cat.id}')" style="padding:6px 8px;flex-shrink:0" title="Change icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 12c0 2.97 2.25 5.44 5 5.92V19H8v-1.08C11.75 17.44 14 14.97 14 12s-2.25-5.44-5-5.92V5H6v1.08C2.25 6.56 1 9.03 1 12zm6-8c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3z"/></svg>
        </button>
        <button class="btn-icon" data-id="${cat.id}" onclick="deleteCatWithCheck('${cat.id}')" style="padding:6px 8px;flex-shrink:0" title="Delete">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-9l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>
    `).join('');
  }

  function startEditCat(id) {
    const display = document.querySelector(`.cat-name-display[data-id="${id}"]`);
    const editBtn = document.querySelector(`.cat-edit-btn[data-id="${id}"]`);
    if (!display || !editBtn) return;

    // Hide other buttons
    const container = display.parentElement;
    const otherBtns = container.querySelectorAll('.btn-icon:not(.cat-edit-btn)');
    otherBtns.forEach(btn => btn.style.display = 'none');

    // Create editable input
    const input = document.createElement('div');
    input.className = 'cat-name-editable';
    input.dataset.id = id;
    input.contentEditable = 'true';
    input.textContent = display.textContent;
    input.style.cssText = 'flex:1;padding:4px 6px;border-radius:4px;outline:2px solid var(--accent)';

    // Replace display with input
    display.replaceWith(input);

    // Update edit button to "Done"
    editBtn.onclick = () => finishEditCat(id);
    editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`;

    // Handle keyboard
    input.onkeydown = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        finishEditCat(id);
      } else if (e.key === 'Escape') {
        e.preventDefault();
        cancelEditCat(id);
      }
    };

    // Focus and select
    input.focus();
    const sel = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(input);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function finishEditCat(id) {
    const el = document.querySelector(`.cat-name-editable[data-id="${id}"]`);
    const newName = el.textContent.trim();

    // Validation
    if (!newName) {
      showToast('Name cannot be empty');
      cancelEditCat(id);
      return;
    }
    if (allCategoriesData.find(c => c.label === newName && c.id !== id)) {
      showToast('Name already exists');
      cancelEditCat(id);
      return;
    }

    // Update category
    const cat = allCategoriesData.find(c => c.id === id);
    cat.label = newName;
    saveAllCategories();

    // Rebuild UI
    showCategoryList();
    buildTypePills();
    buildCatDropdown();
    renderEntries();
    showToast('Category renamed');
  }

  function cancelEditCat(id) {
    showCategoryList();
  }

  function openIconPicker(catId) {
    window.currentIconPickerCat = catId;
    document.getElementById('iconPickerModal').style.display = 'flex';
  }

  function addNewCategory() {
    const name = document.getElementById('newCatName').value.trim();
    if (!name) { showToast('Category name required'); return; }
    if (allCategoriesData.find(c => c.label === name)) { showToast('Category already exists'); return; }
    const customCount = allCategoriesData.filter(c => !c.isBuiltIn).length;
    allCategoriesData.push({
      id: name,
      label: name,
      color: CAT_COLORS[customCount % CAT_COLORS.length],
      iconKey: 'tag',
      isBuiltIn: false
    });
    saveAllCategories();
    showCategoryList();
    document.getElementById('newCatName').value = '';
    buildTypePills();
    buildCatDropdown();
    showToast('Category added');
  }

  function deleteCatWithCheck(id) {
    const entryCount = entries.filter(e => e.type === id).length;
    if (entryCount > 0) {
      showToast(`Cannot delete: ${entryCount} entry/entries use this category`);
      return;
    }
    if (!confirm('Delete this category?')) return;
    allCategoriesData = allCategoriesData.filter(c => c.id !== id);
    saveAllCategories();
    showCategoryList();
    buildTypePills();
    buildCatDropdown();
    renderEntries();
    showToast('Category deleted');
  }

  // ── Form ──────────────────────────────────────────────────
  function toggleForm() {
    const form = document.getElementById('addForm');
    const open = form.classList.toggle('open');
    if (open) { document.getElementById('inputTitle').focus(); buildTypePills(); }
  }

  function buildTypePills() {
    const wrap = document.getElementById('typePills');
    wrap.innerHTML = allCats().map(c => {
      const active = c.id === selectedCat;
      return `<div class="cat-pill${active ? ' active' : ''}" data-cat="${c.id}"
        style="${active ? `background:${c.color};border-color:${c.color}` : ''}">${c.icon} ${c.label}</div>`;
    }).join('') + `<div class="cat-pill add-pill" id="addCustomBtn">${IC.tag} Custom…</div>`;

    wrap.querySelectorAll('.cat-pill[data-cat]').forEach(p =>
      p.addEventListener('click', () => { selectedCat = p.dataset.cat; buildTypePills(); })
    );
    document.getElementById('addCustomBtn').addEventListener('click', () => {
      document.getElementById('customRow').classList.add('open');
      document.getElementById('customCatInput').focus();
    });
  }

  function confirmCustomCat() {
    const val = document.getElementById('customCatInput').value.trim();
    if (!val) return;
    if (!customCats.includes(val) && !BUILT_IN.find(c => c.id === val)) {
      customCats.push(val);
      localStorage.setItem('customCats', JSON.stringify(customCats));
    }
    selectedCat = val;
    cancelCustomCat();
    buildTypePills();
    buildCatDropdown();
  }
  function cancelCustomCat() {
    document.getElementById('customRow').classList.remove('open');
    document.getElementById('customCatInput').value = '';
  }
  document.getElementById('customCatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmCustomCat();
    if (e.key === 'Escape') cancelCustomCat();
  });

  async function addEntry() {
    const title = document.getElementById('inputTitle').value.trim();
    const year  = parseInt(document.getElementById('inputYear').value) || selectedYear;
    if (!title) { showToast('Please enter a title.'); return; }
    setSyncStatus('syncing');
    try {
      await col.add({ title, year, type: selectedCat, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputYear').value = selectedYear;
      toggleForm();
      showToast('Saved!');
    } catch(e) {
      setSyncStatus('error');
      showToast('Error saving — check connection.');
      console.error(e);
    }
  }
  document.getElementById('inputTitle').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

  // ── Edit Mode ────────────────────────────────────────────
  function toggleEditMode() {
    editMode = !editMode;
    const btn = document.getElementById('editModeBtn');
    const label = document.getElementById('editModeLabel');
    if (editMode) {
      btn.classList.add('danger');
      label.textContent = 'Done';
    } else {
      btn.classList.remove('danger');
      label.textContent = 'Edit';
    }
    closeAllDropdowns();
    renderEntries();
  }

  async function renameEntry(id) {
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    const newTitle = prompt('Rename entry:', entry.title);
    if (newTitle && newTitle.trim()) {
      try {
        await col.doc(id).update({ title: newTitle.trim() });
        showToast('Renamed.');
      } catch(e) {
        showToast('Error renaming.');
      }
    }
  }

  async function moveEntry(id, direction) {
    const filtered = entries.filter(e => getYear(e) === selectedYear && (activeFilter === 'All' || e.type === activeFilter));
    const idx = filtered.findIndex(e => e.id === id);
    if (idx === -1) return;
    const newIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (newIdx < 0 || newIdx >= filtered.length) return;
    await swapEntries(id, filtered[newIdx].id);
  }

  async function swapEntries(id1, id2) {
    const e1 = entries.find(e => e.id === id1);
    const e2 = entries.find(e => e.id === id2);
    if (!e1 || !e2) return;
    try {
      await col.doc(id1).update({ createdAt: e2.createdAt });
      await col.doc(id2).update({ createdAt: e1.createdAt });
      showToast('Reordered.');
    } catch(e) {
      showToast('Error reordering.');
    }
  }

  // ── Delete ────────────────────────────────────────────────
  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    try { await col.doc(id).delete(); showToast('Deleted.'); }
    catch(e) { showToast('Error deleting.'); }
  }

  // ── Render ────────────────────────────────────────────────
  function renderAll() { buildYearDropdown(); renderStats(); renderEntries(); buildCatDropdown(); }

  function renderStats() {
    const yearEntries = entries.filter(e => getYear(e) === selectedYear);
    const el = document.getElementById('statsLine');
    if (!yearEntries.length) { el.innerHTML = ''; return; }
    let html = `<span class="total">${yearEntries.length} ${yearEntries.length === 1 ? 'entry' : 'entries'}</span>`;
    allCats().forEach(c => {
      const n = yearEntries.filter(e => e.type === c.id).length;
      if (n > 0) html += `<span style="color:${c.color}">${c.icon} ${n}</span>`;
    });
    el.innerHTML = html;
  }

  function renderEntries() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const el = document.getElementById('entriesList');

    let filtered = entries.filter(e => {
      const matchYear   = getYear(e) === selectedYear;
      const matchCat    = activeFilter === 'All' || e.type === activeFilter;
      const matchSearch = !search || (e.title || '').toLowerCase().includes(search);
      return matchYear && matchCat && matchSearch;
    });

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>${entries.filter(e => getYear(e) === selectedYear).length === 0
          ? `Nothing logged for ${selectedYear} yet.`
          : 'No entries match your filter.'}</p>
      </div>`;
      return;
    }

    // Group by category (in BUILT_IN order, then custom), entries sorted oldest→newest
    const groups = {};
    filtered.forEach(e => { (groups[e.type] = groups[e.type] || []).push(e); });

    const orderedCats = allCats().filter(c => groups[c.id]);
    // Any entries with unrecognised categories
    Object.keys(groups).forEach(id => { if (!orderedCats.find(c => c.id === id)) orderedCats.push(catMeta(id)); });

    el.innerHTML = orderedCats.map(cat => {
      const items = groups[cat.id]; // already ordered asc by createdAt from Firestore
      const rows = items.map((e, idx) => {
        if (editMode && isOwner) {
          return `
            <div class="entry-row draggable" draggable="true" data-id="${e.id}" style="display:flex;align-items:center;gap:8px">
              <svg class="drag-handle" style="width:18px;height:18px;color:var(--text-muted);flex-shrink:0;cursor:grab" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>
              <div class="entry-title" data-id="${e.id}" style="flex:1;min-width:0;padding:2px 4px;border-radius:4px">${escHtml(e.title)}</div>
              <button class="btn-icon edit-title-btn" data-id="${e.id}" onclick="toggleTitleEdit('${e.id}')" style="padding:6px 8px;flex-shrink:0">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="del-btn delete-btn" onclick="deleteEntry('${e.id}')" style="flex-shrink:0">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>`;
        } else {
          return `
            <div class="entry-row">
              <div class="entry-title">${escHtml(e.title)}</div>
            </div>`;
        }
      }).join('');

      return `<div class="cat-group">
        <div class="cat-group-header" style="color:${cat.color}">${cat.icon} ${cat.label}
          <span class="cat-count">${items.length}</span>
        </div>
        <div class="entry-list">${rows}</div>
      </div>`;
    }).join('');

    // Attach drag event listeners to draggable entry rows
    if (editMode && isOwner) {
      const rows = document.querySelectorAll('.entry-row[draggable]');
      rows.forEach(row => {
        row.addEventListener('dragstart', e => {
          draggedEntry = row.dataset.id;
          row.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        row.addEventListener('dragend', () => {
          row.classList.remove('dragging');
          draggedEntry = null;
          document.querySelectorAll('.entry-row').forEach(r => r.classList.remove('drag-over'));
        });
        row.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (draggedEntry && draggedEntry !== row.dataset.id) {
            row.classList.add('drag-over');
          }
        });
        row.addEventListener('dragleave', () => {
          row.classList.remove('drag-over');
        });
        row.addEventListener('drop', async e => {
          e.preventDefault();
          if (draggedEntry && draggedEntry !== row.dataset.id) {
            await swapEntries(draggedEntry, row.dataset.id);
          }
        });
      });

      // Attach title edit handlers
      const titleElements = document.querySelectorAll('.entry-title[data-id]');
      titleElements.forEach(titleEl => {
        titleEl.addEventListener('blur', async () => {
          if (!titleEl.contentEditable || titleEl.contentEditable === 'false') return;
          const id = titleEl.dataset.id;
          const newTitle = titleEl.textContent.trim();
          const oldEntry = entries.find(e => e.id === id);

          if (newTitle && newTitle !== oldEntry?.title) {
            try {
              await col.doc(id).update({ title: newTitle });
              showToast('Renamed.');
            } catch(err) {
              showToast('Error saving.');
              titleEl.textContent = oldEntry?.title || '';
            }
          } else {
            titleEl.textContent = oldEntry?.title || '';
          }
          finishTitleEdit(id);
        });
        titleEl.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            e.preventDefault();
            titleEl.blur();
          } else if (e.key === 'Escape') {
            e.preventDefault();
            const id = titleEl.dataset.id;
            titleEl.textContent = entries.find(ent => ent.id === id)?.title || '';
            finishTitleEdit(id);
          }
        });
      });
    }
  }

  function toggleTitleEdit(id) {
    const titleEl = document.querySelector(`.entry-title[data-id="${id}"]`);
    const btnEl = document.querySelector(`.edit-title-btn[data-id="${id}"]`);
    const rowEl = document.querySelector(`.entry-row[data-id="${id}"]`);
    if (!titleEl || !btnEl || !rowEl) return;

    if (titleEl.contentEditable === 'true') {
      // Currently editing, finish edit
      titleEl.blur();
    } else {
      // Start editing
      titleEl.contentEditable = 'true';
      titleEl.style.background = 'var(--surface2)';
      titleEl.style.outline = '2px solid var(--accent)';
      rowEl.classList.add('editing-title');
      // Change button icon to checkmark
      btnEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      // Focus and select all text
      titleEl.focus();
      setTimeout(() => {
        const range = document.createRange();
        range.selectNodeContents(titleEl);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }, 0);
    }
  }

  function finishTitleEdit(id) {
    const titleEl = document.querySelector(`.entry-title[data-id="${id}"]`);
    const btnEl = document.querySelector(`.edit-title-btn[data-id="${id}"]`);
    const rowEl = document.querySelector(`.entry-row[data-id="${id}"]`);
    if (!titleEl || !btnEl || !rowEl) return;

    titleEl.contentEditable = 'false';
    titleEl.style.background = '';
    titleEl.style.outline = '';
    rowEl.classList.remove('editing-title');
    // Change button icon back to pencil
    btnEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    closeAllDropdowns();
    if (!entries.length) { showToast('Nothing to export yet.'); return; }
    const rows = entries.map(e => [`"${(e.title||'').replace(/"/g,'""')}"`, getYear(e), e.type].join(','));
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['Title,Year,Category\n' + rows.join('\n')], { type: 'text/csv' }));
    a.download = `media-log-${selectedYear}.csv`;
    a.click();
    showToast('CSV exported!');
  }

  // ── Auth error ────────────────────────────────────────────
  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('visible');
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
