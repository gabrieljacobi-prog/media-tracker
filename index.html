<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --base03:#002b36;
  --base02:#073642;
  --base01:#586e75;
  --base00:#657b83;
  --base0:#839496;
  --base1:#93a1a1;
  --base2:#eee8d5;
  --base3:#fdf6e3;
  --error:#ec5c59;

  --cat-movies:#d6616b;
  --cat-tv:#ad494a;
  --cat-videogames:#7375b5;
  --cat-comics:#bd9e39;
  --cat-books:#8ca252;
  --cat-concerts:#4a5584;
  --cat-standup:#a55194;
  --cat-audiobooks:#637939;
  --cat-podcasts:#7b4173;
  --cat-plays:#ce6dbd;
  --cat-other:#586e75;

  --bg:#fdf6e3;
  --text:#002b36;
  --text-secondary:#073642;
  --text-muted:#586e75;
  --text-placeholder:#657b83;
  --border:#839496;
  --border-card:#93a1a1;
  --surface:#eee8d5;
  --gold:#f5a623;

  font-family:'Bricolage Grotesque',system-ui,-apple-system,sans-serif;
  font-size:16px;
  color:var(--text);
  background:var(--bg);
}

body{min-height:100vh;background:var(--bg);overflow-x:hidden}

/* ── Navbar ───────────────────────────────────────────── */
.navbar{
  height:88px;display:flex;align-items:center;justify-content:space-between;
  padding:0 80px;border-bottom:1.5px solid var(--border);position:relative;
}
.navbar-left{display:flex;align-items:center;gap:16px;min-width:0}

/* Logo */
.logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.logo-desktop{display:block;height:40px;width:auto}
.logo-mobile{display:none;height:36px;width:auto}
.logo-text{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.02em;white-space:nowrap}

.sync-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sync-dot.synced{background:#859900}
.sync-dot.syncing{background:var(--base00);animation:pulse 1.5s infinite}
.sync-dot.error{background:var(--error)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.navbar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}

/* Add button */
.add-btn{
  width:40px;height:40px;border-radius:50%;background:var(--base02);color:white;
  border:none;cursor:pointer;display:none;align-items:center;justify-content:center;
  transition:opacity .15s;flex-shrink:0;
}
.add-btn.visible{display:flex}
.add-btn:hover{opacity:.85}
.add-btn i{width:20px;height:20px}

/* Menu button */
.menu-btn{
  width:40px;height:40px;border-radius:50%;background:none;border:1.5px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);
  transition:background .15s;flex-shrink:0;
}
.menu-btn:hover{background:var(--surface)}

/* ── Dropdown (shared) ────────────────────────────────── */
.dropdown{
  position:absolute;display:none;z-index:100;
  background:var(--bg);border:1.5px solid var(--border-card);border-radius:24px;
  box-shadow:0 6px 20px rgba(0,0,0,.12);overflow:hidden;
}
.dropdown.open{display:block}

/* Menu dropdown */
.menu-dropdown{right:80px;top:72px;width:239px;padding:8px 0}
.menu-dropdown .menu-email{padding:12px 20px;font-size:13px;color:var(--text-muted);display:none}
.menu-dropdown .menu-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;width:100%;
  background:none;border:none;cursor:pointer;font-family:inherit;font-size:15px;
  color:var(--base01);transition:background .1s;
}
.menu-dropdown .menu-item:hover{background:var(--surface)}
.menu-dropdown .menu-item i{width:16px;height:16px;flex-shrink:0}
.menu-dropdown .menu-item.danger{color:var(--error)}
.menu-dropdown .menu-item.danger i{color:var(--error)}
.menu-dropdown .menu-divider{height:1px;background:var(--border-card);margin:4px 0}
.menu-dropdown .menu-item.hidden{display:none}

/* Year dropdown — positioned under .year-btn-wrap */
.year-dropdown{
  top:calc(100% + 6px);left:0;min-width:160px;padding:6px 0;
}
.year-dropdown .dropdown-item{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:8px 16px;width:100%;background:none;border:none;cursor:pointer;
  font-family:inherit;font-size:15px;color:var(--text);transition:background .1s;
}
.year-dropdown .dropdown-item:hover{background:var(--surface)}
.year-dropdown .dropdown-item.selected{font-weight:700}

/* ── Main Container ───────────────────────────────────── */
.container{
  padding:0 80px 64px;
  max-width:1440px;
  width:100%;
  margin:0 auto;
  overflow:hidden;
}

/* ── Auth Error ───────────────────────────────────────── */
.auth-error{
  display:none;background:var(--error);color:white;text-align:center;
  padding:10px 16px;border-radius:12px;margin-bottom:16px;font-size:14px;
}
.auth-error.visible{display:block}

/* ── Add Form ─────────────────────────────────────────── */
.add-form{
  display:none;background:var(--bg);border:2px solid var(--border-card);
  border-radius:24px;padding:32px 24px;margin-top:24px;margin-bottom:0;
  box-shadow:0 6px 4px rgba(0,0,0,.25);position:relative;
}
.add-form.open{display:block}
@media(min-width:769px){
  .add-form{max-width:680px;margin-left:auto;margin-right:auto}
}
.add-form h3{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text);padding-right:40px}

/* Close (X) button in top-right of form */
.form-close-btn{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;background:none;
  border:1.5px solid var(--border-card);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:background .15s;
}
.form-close-btn:hover{background:var(--surface)}
.form-close-btn i{width:15px;height:15px}

.form-row{display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.form-input{
  flex:1;min-width:0;padding:10px 14px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:12px;font-family:inherit;
  font-size:15px;color:var(--text);outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--base02)}
.form-input::placeholder{color:var(--text-placeholder)}
.year-input{width:90px;flex:none}

/* Form category pills — always colored, dimmed when inactive */
.form-cat-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.form-cat-pill{
  padding:6px 14px;border-radius:16px;border:none;
  font-family:inherit;font-size:13px;color:white;
  cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;gap:6px;
  opacity:0.38;
}
.form-cat-pill.active{opacity:1}
.form-cat-pill:hover:not(.active){opacity:0.65}

.form-actions{display:flex;gap:12px;align-items:center}
.btn-submit{
  padding:10px 24px;background:var(--base02);color:white;border:none;
  border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity .15s;
}
.btn-submit:hover{opacity:.85}
.btn-cancel{
  padding:10px 24px;background:none;color:var(--text-muted);
  border:1.5px solid var(--border-card);
  border-radius:12px;font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{background:var(--surface)}

.fav-toggle{
  display:flex;align-items:center;gap:6px;background:none;border:none;
  cursor:pointer;font-family:inherit;font-size:14px;color:var(--text-muted);
  padding:8px 12px;border-radius:10px;transition:background .15s;
}
.fav-toggle:hover{background:var(--surface)}
.fav-toggle i,.fav-toggle svg{fill:none;stroke:currentColor;transition:all .15s}
.fav-toggle.starred i,.fav-toggle.starred svg{fill:var(--gold);stroke:var(--gold);color:var(--gold)}

/* ── Year + Search row ────────────────────────────────── */
.year-search-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0;gap:16px;
}

/* Year button (small, with chevron) */
.year-btn-wrap{position:relative}
.year-btn{
  display:flex;align-items:center;gap:6px;
  font-family:inherit;font-size:22px;font-weight:700;color:var(--text);
  background:none;border:none;cursor:pointer;letter-spacing:-0.02em;
  transition:opacity .15s;padding:0;
}
.year-btn:hover{opacity:.7}
.year-btn.open{opacity:.7}
.year-chevron{
  width:18px;height:18px;color:var(--text-muted);
  transition:transform .2s;flex-shrink:0;
}
.year-btn.open .year-chevron{transform:rotate(180deg)}

/* Search bar (now in content area, not navbar) */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1.5px solid var(--border);border-radius:20px;
  padding:8px 16px;width:260px;transition:all .2s;
}
.search-bar input{
  flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:14px;
  color:var(--text);min-width:0;
}
.search-bar input::placeholder{color:var(--text-placeholder)}
.search-bar .search-icon{color:var(--text-muted);width:16px;height:16px;flex-shrink:0}
.search-close-btn{
  background:none;border:none;cursor:pointer;padding:0;
  display:none;align-items:center;justify-content:center;
  color:var(--text-muted);line-height:1;
}
.search-close-btn i,.search-close-btn svg{width:16px;height:16px}

/* Divider below year+search row — bleeds full width past container padding */
.year-divider{height:1.5px;background:var(--border);margin-bottom:28px;margin-left:-80px;margin-right:-80px}

/* ── Stats area: counter + pills ─────────────────────── */
.stats-area{
  display:flex;align-items:center;gap:24px;margin-bottom:32px;flex-wrap:wrap;
}
.entry-counter{
  display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0;
  line-height:1;
}
.entry-counter-num{
  font-size:64px;font-weight:800;letter-spacing:-0.04em;color:var(--text);line-height:0.9;
}
.entry-counter-label{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--text-muted);margin-top:6px;
}
.stats-row{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex:1;
}
.stat-pill{
  display:flex;align-items:center;gap:6px;padding:5px 14px;
  border-radius:16px;border:none;background:none;
  font-family:inherit;font-size:14px;color:white;cursor:pointer;
  transition:opacity .2s;
}
.stat-pill .pill-count{font-weight:700;font-size:13px;margin-left:2px}
/* Dim non-active pills when a category filter is set */
.stats-row.has-filter .stat-pill:not(.active){opacity:0.32}
.stats-row.has-filter .stat-pill:not(.active):hover{opacity:0.65}

/* ── Entries layout ───────────────────────────────────── */
.entries-columns{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  align-items:start;
  width:100%;
  min-width:0;
}
/* Each masonry col fills its grid cell */
.masonry-col{width:100%;min-width:0}

/* ── Category card ────────────────────────────────────── */
.cat-group{
  border:2px solid var(--border-card);border-radius:16px;padding:16px;
  margin-bottom:16px;background:var(--bg);
  min-width:0;overflow:hidden;
}
.cat-group-header{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
  font-weight:700;font-size:16px;
}
.cat-group-header i,.cat-group-header svg{width:16px;height:16px;flex-shrink:0}
.cat-count{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:26px;height:26px;border-radius:16px;padding:0 8px;
  font-weight:700;font-size:16px;color:white;margin-left:auto;
}
.entry-list{display:flex;flex-direction:column;gap:2px}

/* ── Entry row ────────────────────────────────────────── */
.entry-row{
  display:flex;align-items:center;gap:8px;padding:5px 0;
  font-size:16px;color:var(--text-secondary);
}
.entry-title{
  flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
/* Star in normal view — only rendered when favorited, no outline otherwise */
.fav-badge{flex-shrink:0;display:flex;align-items:center}
.fav-badge i,.fav-badge svg{width:15px;height:15px;fill:var(--gold);stroke:var(--gold)}
/* Star in edit mode — outline idle, gold outline hover, filled when starred */
.star-btn{
  background:none;border:none;cursor:pointer;padding:2px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--base1);transition:color .15s;
}
.star-btn i,.star-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;transition:fill .15s,stroke .15s}
.star-btn.starred i,.star-btn.starred svg{fill:var(--gold);stroke:var(--gold)}
.star-btn:not(.starred):hover i,.star-btn:not(.starred):hover svg{stroke:var(--gold);fill:rgba(245,166,35,.18)}

/* Edit mode buttons */
.btn-icon{
  background:none;border:none;cursor:pointer;padding:4px;display:flex;
  align-items:center;justify-content:center;color:var(--text-muted);border-radius:6px;
  transition:background .15s;
}
.btn-icon:hover{background:var(--surface)}
.del-btn{color:var(--error)}
.del-btn:hover{background:rgba(236,92,89,.1)}
.drag-handle{cursor:grab;color:var(--text-muted)}
.entry-row.dragging{opacity:.4}
.entry-row.drag-over{border-top:2px solid var(--base02)}

/* ── Empty State ──────────────────────────────────────── */
.empty-state{
  text-align:center;padding:64px 24px;color:var(--text-muted);
  grid-column:1/-1;
}
.empty-state i{width:48px;height:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:15px}

/* ── Toast ────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--base02);color:white;padding:10px 24px;border-radius:12px;
  font-size:14px;opacity:0;pointer-events:none;transition:all .25s;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Large screen refinements ─────────────────────────── */
@media(min-width:1280px){
  .navbar{padding:0 120px}
  .menu-dropdown{right:120px}
  .container{padding:0 120px 80px}
  .entry-row{font-size:17px}
  .year-divider{margin-left:-120px;margin-right:-120px}
}

/* ── Mobile ───────────────────────────────────────────── */
@media(max-width:768px){
  .navbar{height:64px;padding:0 16px}
  .menu-dropdown{right:16px;top:56px}

  /* Logo: icon only on mobile */
  .logo-desktop{display:none}
  .logo-mobile{display:block}

  .container{padding:0 16px 48px}
  .year-search-row{gap:12px;padding:16px 0}
  .search-bar{flex:1;min-width:0}
  .year-divider{margin-left:-16px;margin-right:-16px}
  .stats-area{flex-direction:column;align-items:flex-start;gap:16px}
  .entries-columns{grid-template-columns:1fr}
  .entry-counter-num{font-size:48px}
  .add-form{max-width:none;padding:24px 16px;margin-left:0;margin-right:0}
}
</style>
</head>
<body>
<!-- ── Navbar ────────────────────────────────────────── -->
<nav class="navbar">
  <div class="navbar-left">
    <a href="/" class="logo">
      <img src="logo-desktop.svg" class="logo-desktop" alt="Media Tracker"
           onerror="this.onerror=null;this.style.display='none';document.getElementById('logoTextDesktop').style.display='block'">
      <img src="logo-mobile.svg" class="logo-mobile" alt="Media Tracker"
           onerror="this.onerror=null;this.style.display='none';document.getElementById('logoTextMobile').style.display='block'">
      <span class="logo-text" id="logoTextDesktop" style="display:none">Media Tracker</span>
      <span class="logo-text" id="logoTextMobile" style="display:none;font-size:20px">MT</span>
    </a>
    <span class="sync-dot" id="syncDot"></span>
  </div>
  <div class="navbar-right">
    <button class="add-btn" id="addEntryBtn" onclick="toggleForm()" title="Add entry">
      <i data-lucide="plus"></i>
    </button>
    <button class="menu-btn" id="menuBtn">
      <i data-lucide="ellipsis-vertical"></i>
    </button>
  </div>
  <!-- Menu dropdown -->
  <div class="dropdown menu-dropdown" id="menuDropdown">
    <div class="menu-email" id="authEmailRow"></div>
    <button class="menu-item hidden" id="editModeBtn" onclick="toggleEditMode()">
      <i data-lucide="pencil"></i><span>Edit</span>
    </button>
    <button class="menu-item" id="exportBtn" onclick="exportCSV()">
      <i data-lucide="download"></i><span>Export CSV</span>
    </button>
    <div class="menu-divider"></div>
    <button class="menu-item" id="authMenuItem" onclick="handleAuthClick()">
      <i data-lucide="user"></i><span>Sign in with Google</span>
    </button>
  </div>
</nav>

<!-- ── Main ──────────────────────────────────────────── -->
<div class="container">
  <div class="auth-error" id="authError"></div>

  <!-- Add form -->
  <div class="add-form" id="addForm">
    <button class="form-close-btn" onclick="closeForm()" title="Close">
      <i data-lucide="x"></i>
    </button>
    <h3>New Entry</h3>
    <div class="form-row">
      <input class="form-input" type="text" id="inputTitle" placeholder="Title" autocomplete="off">
      <input class="form-input year-input" type="number" id="inputYear" min="1900" max="2099">
      <button class="fav-toggle" id="favoriteToggle" onclick="toggleFormFavorite()" title="Toggle favorite">
        <i data-lucide="star" id="favoriteStarIcon"></i>
      </button>
    </div>
    <div class="form-cat-pills" id="formCatPills"></div>
    <div class="form-actions">
      <button class="btn-submit" onclick="addEntry()">Add</button>
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
    </div>
  </div>

  <!-- Year selector + Search (same row) -->
  <div class="year-search-row">
    <div class="year-btn-wrap">
      <button class="year-btn" id="yearBtn">
        <span id="yearLabel"></span>
        <i data-lucide="chevron-down" class="year-chevron"></i>
      </button>
      <div class="dropdown year-dropdown" id="yearDropdown"></div>
    </div>
    <div class="search-bar" id="searchBar">
      <i data-lucide="search" class="search-icon"></i>
      <input type="text" id="searchInput" placeholder="Search entries..." autocomplete="off">
      <button class="search-close-btn" id="searchCloseBtn" title="Clear">
        <i data-lucide="x"></i>
      </button>
    </div>
  </div>

  <!-- Full-width divider -->
  <div class="year-divider"></div>

  <!-- Stats area: big counter + category pills -->
  <div class="stats-area">
    <div class="entry-counter">
      <span class="entry-counter-num" id="entryCountNum">0</span>
      <span class="entry-counter-label">Entries</span>
    </div>
    <div class="stats-row" id="statsPills"></div>
  </div>

  <!-- Entries -->
  <div class="entries-columns" id="entriesList"></div>
</div>

<div class="toast" id="toast"></div>

<!-- ── Scripts ───────────────────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script>
  // ── Firebase ──────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyArOMqSQL04Dd7ff_8g_G9872tXO9XkiAc",
    authDomain: "media-tracker-a00cf.firebaseapp.com",
    projectId: "media-tracker-a00cf",
    storageBucket: "media-tracker-a00cf.firebasestorage.app",
    messagingSenderId: "839766001354",
    appId: "1:839766001354:web:4520dfe872f4039aac9633"
  };
  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  const auth = firebase.auth();
  const col  = db.collection('entries');

  // ── Icons (Lucide) ────────────────────────────────────────
  const IC = {
    film:          '<i data-lucide="film" width="16" height="16"></i>',
    tv:            '<i data-lucide="tv" width="16" height="16"></i>',
    bookCopy:      '<i data-lucide="book-copy" width="16" height="16"></i>',
    bookHeadphones:'<i data-lucide="headphones" width="16" height="16"></i>',
    mic:           '<i data-lucide="mic" width="16" height="16"></i>',
    drama:         '<i data-lucide="ticket" width="16" height="16"></i>',
    messageCircle: '<i data-lucide="message-square" width="16" height="16"></i>',
    gamepad2:      '<i data-lucide="gamepad-2" width="16" height="16"></i>',
    music:         '<i data-lucide="music" width="16" height="16"></i>',
    micVocal:      '<i data-lucide="smile" width="16" height="16"></i>',
    check:         '<i data-lucide="check" width="16" height="16"></i>',
    tag:           '<i data-lucide="tag" width="16" height="16"></i>',
    signout:       '<i data-lucide="log-out" width="16" height="16"></i>',
    star:          '<i data-lucide="star" width="16" height="16"></i>',
    starFilled:    '<i data-lucide="star" width="16" height="16" style="fill:var(--gold);stroke:var(--gold)"></i>',
    ellipsis:      '<i data-lucide="ellipsis" width="16" height="16"></i>'
  };

  // ── Categories ────────────────────────────────────────────
  const CATEGORIES = [
    { id: 'Movies',      label: 'Movies',      color: 'var(--cat-movies)',     icon: IC.film           },
    { id: 'TV Shows',    label: 'TV Shows',    color: 'var(--cat-tv)',         icon: IC.tv             },
    { id: 'Books',       label: 'Books',       color: 'var(--cat-books)',      icon: IC.bookCopy       },
    { id: 'Audiobooks',  label: 'Audiobooks',  color: 'var(--cat-audiobooks)', icon: IC.bookHeadphones },
    { id: 'Comics',      label: 'Comics',      color: 'var(--cat-comics)',     icon: IC.messageCircle  },
    { id: 'Video Games', label: 'Video Games', color: 'var(--cat-videogames)', icon: IC.gamepad2       },
    { id: 'Concerts',    label: 'Concerts',    color: 'var(--cat-concerts)',   icon: IC.music          },
    { id: 'Podcasts',    label: 'Podcasts',    color: 'var(--cat-podcasts)',   icon: IC.mic            },
    { id: 'Stand-up',    label: 'Stand-up',    color: 'var(--cat-standup)',    icon: IC.micVocal       },
    { id: 'Plays',       label: 'Plays',       color: 'var(--cat-plays)',      icon: IC.drama          },
    { id: 'Other',       label: 'Other',       color: 'var(--cat-other)',      icon: IC.tag            },
  ];

  function catMeta(id) {
    return CATEGORIES.find(c => c.id === id) || { id, label: id, color: 'var(--cat-other)', icon: IC.tag };
  }

  // ── State ─────────────────────────────────────────────────
  let entries      = [];
  let selectedCat  = CATEGORIES[0].id;
  let activeFilter = 'All';
  let selectedYear = new Date().getFullYear();
  let isOwner      = false;
  let currentUser  = null;
  let editMode     = false;
  let draggedEntry = null;
  let formFavorite = false;

  function getYear(e) {
    if (e.year) return parseInt(e.year);
    if (e.date) return parseInt(e.date.split('-')[0]);
    return 0;
  }
  function getTimestamp(e) {
    if (e.createdAt && e.createdAt.toMillis) return e.createdAt.toMillis();
    if (e.createdAt && e.createdAt.seconds) return e.createdAt.seconds * 1000;
    return 0;
  }
  // sortOrder falls back to createdAt millis for entries that predate this field
  function getSortOrder(e) {
    return e.sortOrder !== undefined ? e.sortOrder : getTimestamp(e);
  }

  // ── Boot ──────────────────────────────────────────────────
  document.getElementById('yearLabel').textContent = selectedYear;
  document.getElementById('inputYear').value = selectedYear;
  buildTypePills([]);

  function setSyncStatus(s) { document.getElementById('syncDot').className = 'sync-dot ' + s; }
  setSyncStatus('syncing');

  col.onSnapshot(
    snap => {
      entries = snap.docs.map(d => {
        const data = d.data();
        // Normalize missing type
        if (!data.type) data.type = 'Other';
        // Normalize legacy date field → year
        if (!data.year && data.date) data.year = parseInt(data.date.split('-')[0]);
        return { id: d.id, ...data };
      }).sort((a, b) => getSortOrder(a) - getSortOrder(b));
      setSyncStatus('synced');
      renderAll();
      // Run one-time Firestore schema migration for the owner
      if (isOwner && !localStorage.getItem('mt_migrated_v2')) migrateSchema();
    },
    err => { setSyncStatus('error'); console.error(err); }
  );

  // ── Auth ──────────────────────────────────────────────────
  const OWNER_EMAIL = 'gabriel.jacobi@gmail.com';

  auth.getRedirectResult().then(result => {
    if (result && result.user) {
      currentUser = result.user;
      isOwner = result.user.email === OWNER_EMAIL;
      updateAuthUI(result.user);
      renderAll();
    } else if (auth.currentUser) {
      currentUser = auth.currentUser;
      isOwner = auth.currentUser.email === OWNER_EMAIL;
      updateAuthUI(auth.currentUser);
      renderAll();
    }
  }).catch(err => {
    showAuthError('Sign-in failed (' + (err.code || 'unknown error') + '). Try again.');
  });

  auth.onAuthStateChanged(user => {
    currentUser = user;
    isOwner = !!(user && user.email === OWNER_EMAIL);
    if (!user && editMode) {
      editMode = false;
      const btn = document.getElementById('editModeBtn');
      if (btn) {
        btn.innerHTML = `<i data-lucide="pencil" width="16" height="16"></i><span>Edit</span>`;
        lucide.createIcons({ el: btn });
      }
    }
    updateAuthUI(user);
    renderAll();
  });

  function updateAuthUI(user) {
    const menuBtn  = document.getElementById('authMenuItem');
    const addBtn   = document.getElementById('addEntryBtn');
    const emailRow = document.getElementById('authEmailRow');
    const editBtn  = document.getElementById('editModeBtn');
    if (user) {
      if (emailRow) { emailRow.style.display = 'block'; emailRow.textContent = user.email || ''; }
      if (menuBtn) {
        menuBtn.innerHTML = `${IC.signout} <span>Sign out</span>`;
        lucide.createIcons({ el: menuBtn });
        menuBtn.classList.add('danger');
      }
      if (addBtn && isOwner) addBtn.classList.add('visible');
      if (editBtn && isOwner) editBtn.classList.remove('hidden');
    } else {
      if (emailRow) emailRow.style.display = 'none';
      if (menuBtn) {
        menuBtn.innerHTML = `<i data-lucide="user" width="16" height="16"></i> <span>Sign in with Google</span>`;
        lucide.createIcons({ el: menuBtn });
        menuBtn.classList.remove('danger');
      }
      if (addBtn) addBtn.classList.remove('visible');
      if (editBtn) editBtn.classList.add('hidden');
    }
  }

  function handleAuthClick() {
    closeAllDropdowns();
    if (currentUser) {
      if (confirm('Sign out?')) auth.signOut();
      return;
    }
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ 'prompt': 'select_account' });
    auth.signInWithPopup(provider).then(result => {
      currentUser = result.user;
      isOwner = result.user && result.user.email === OWNER_EMAIL;
      updateAuthUI(result.user);
      renderAll();
    }).catch(err => {
      if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') return;
      auth.signInWithRedirect(provider).catch(redirectErr => {
        showAuthError(redirectErr.code || redirectErr.message || 'Sign-in failed.');
      });
    });
  }

  // ── Kebab menu ────────────────────────────────────────────
  document.getElementById('menuBtn').addEventListener('click', e => {
    e.stopPropagation();
    const dd = document.getElementById('menuDropdown');
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) dd.classList.add('open');
  });

  // ── Year dropdown ─────────────────────────────────────────
  function availableYears() {
    const years = new Set(entries.map(e => getYear(e)));
    years.add(new Date().getFullYear());
    return [...years].filter(y => y > 0).sort((a, b) => b - a);
  }

  function buildYearDropdown() {
    const dd = document.getElementById('yearDropdown');
    const years = availableYears();
    dd.innerHTML = years.map(y => `
      <button class="dropdown-item${y === selectedYear ? ' selected' : ''}" onclick="selectYear(${y})">
        ${y} ${y === selectedYear ? IC.check : ''}
      </button>
    `).join('');
    lucide.createIcons({ el: dd });
  }

  function selectYear(y) {
    selectedYear = y;
    document.getElementById('yearLabel').textContent = y;
    document.getElementById('inputYear').value = y;
    closeAllDropdowns();
    renderAll();
  }

  document.getElementById('yearBtn').addEventListener('click', e => {
    e.stopPropagation();
    buildYearDropdown();
    const dd = document.getElementById('yearDropdown');
    const btn = document.getElementById('yearBtn');
    const isOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!isOpen) { dd.classList.add('open'); btn.classList.add('open'); }
  });

  // ── Search ────────────────────────────────────────────────
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', () => {
    // Show/hide clear button
    const closeBtn = document.getElementById('searchCloseBtn');
    closeBtn.style.display = searchInput.value ? 'flex' : 'none';
    renderEntries();
  });

  document.getElementById('searchCloseBtn').addEventListener('click', e => {
    e.stopPropagation();
    searchInput.value = '';
    document.getElementById('searchCloseBtn').style.display = 'none';
    renderEntries();
    searchInput.focus();
  });

  // ── Global close ──────────────────────────────────────────
  function closeAllDropdowns() {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    document.getElementById('yearBtn').classList.remove('open');
  }
  document.addEventListener('click', closeAllDropdowns);

  // ── Form ──────────────────────────────────────────────────
  function toggleForm() {
    const form = document.getElementById('addForm');
    if (form.classList.contains('open')) closeForm();
    else openForm();
  }

  function openForm() {
    const form = document.getElementById('addForm');
    form.classList.add('open');
    document.getElementById('inputTitle').focus();
    buildFormCatPills();
    formFavorite = false;
    const btn = document.getElementById('favoriteToggle');
    if (btn) btn.classList.remove('starred');
    const icon = document.getElementById('favoriteStarIcon');
    if (icon) { icon.setAttribute('fill', 'none'); icon.setAttribute('stroke', 'currentColor'); }
  }

  function closeForm() {
    document.getElementById('addForm').classList.remove('open');
    document.getElementById('inputTitle').value = '';
  }

  function toggleFormFavorite() {
    formFavorite = !formFavorite;
    const btn  = document.getElementById('favoriteToggle');
    const icon = document.getElementById('favoriteStarIcon');
    if (formFavorite) {
      btn.classList.add('starred');
      if (icon) { icon.setAttribute('fill', 'var(--gold)'); icon.setAttribute('stroke', 'var(--gold)'); }
    } else {
      btn.classList.remove('starred');
      if (icon) { icon.setAttribute('fill', 'none'); icon.setAttribute('stroke', 'currentColor'); }
    }
  }

  function buildFormCatPills() {
    const el = document.getElementById('formCatPills');
    el.innerHTML = CATEGORIES.map(cat => {
      const active = cat.id === selectedCat;
      return `<button class="form-cat-pill${active ? ' active' : ''}"
        style="background:${cat.color}"
        onclick="selectFormCat('${cat.id}')">${cat.icon} ${cat.label}</button>`;
    }).join('');
    lucide.createIcons({ el });
  }

  function selectFormCat(id) {
    selectedCat = id;
    buildFormCatPills();
  }

  async function addEntry() {
    const title = document.getElementById('inputTitle').value.trim();
    const year  = parseInt(document.getElementById('inputYear').value);
    if (!title) { showToast('Title is required.'); return; }
    if (!year || year < 1900 || year > 2099) { showToast('A valid year is required.'); return; }
    try {
      await col.add({ title, type: selectedCat, year, favorite: formFavorite,
        sortOrder: Date.now(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      document.getElementById('inputTitle').value = '';
      formFavorite = false;
      const btn = document.getElementById('favoriteToggle');
      if (btn) btn.classList.remove('starred');
      const icon = document.getElementById('favoriteStarIcon');
      if (icon) { icon.setAttribute('fill','none'); icon.setAttribute('stroke','currentColor'); }
      showToast('Entry added!');
    } catch(e) { showToast('Error adding entry.'); }
  }

  // ── Edit Mode ─────────────────────────────────────────────
  function toggleEditMode() {
    closeAllDropdowns();
    editMode = !editMode;
    const btn = document.getElementById('editModeBtn');
    btn.innerHTML = editMode
      ? `<i data-lucide="check" width="16" height="16"></i><span>Done editing</span>`
      : `<i data-lucide="pencil" width="16" height="16"></i><span>Edit</span>`;
    lucide.createIcons({ el: btn });
    renderEntries();
  }

  // ── Move / Reorder ────────────────────────────────────────
  // Inserts the dragged entry just before the target entry in the global sort order.
  // Uses fractional sortOrder values (midpoint); renumbers all entries if precision runs out.
  async function moveEntry(draggedId, targetId) {
    const sorted = [...entries].sort((a, b) => getSortOrder(a) - getSortOrder(b));
    const targetIdx = sorted.findIndex(e => e.id === targetId);
    if (targetIdx < 0) return;
    const prev = sorted[targetIdx - 1];
    const target = sorted[targetIdx];
    const prevOrder = prev ? getSortOrder(prev) : getSortOrder(target) - 20000;
    const gap = getSortOrder(target) - prevOrder;
    try {
      if (gap < 1) {
        // Precision exhausted — renumber all entries with clean spacing
        const batch = db.batch();
        sorted.forEach((e, i) => batch.update(col.doc(e.id), { sortOrder: (i + 1) * 10000 }));
        await batch.commit();
      } else {
        await col.doc(draggedId).update({ sortOrder: prevOrder + gap / 2 });
      }
      showToast('Reordered.');
    } catch(e) { showToast('Error reordering.'); }
  }

  // ── Schema Migration (owner-only, runs once) ──────────────
  async function migrateSchema() {
    const batch = db.batch();
    let count = 0;
    entries.forEach(e => {
      const u = {};
      // Fix year stored as string
      if (e.year !== undefined && typeof e.year === 'string' && e.year !== '')
        u.year = parseInt(e.year);
      // Fix legacy date field
      if (!e.year && e.date)
        u.year = parseInt(e.date.split('-')[0]);
      // Fix missing type
      if (!e.type) u.type = 'Other';
      if (Object.keys(u).length) { batch.update(col.doc(e.id), u); count++; }
    });
    if (count) await batch.commit();
    localStorage.setItem('mt_migrated_v2', '1');
  }

  // ── Delete ────────────────────────────────────────────────
  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    try { await col.doc(id).delete(); showToast('Deleted.'); }
    catch(e) { showToast('Error deleting.'); }
  }

  // ── Favorite ──────────────────────────────────────────────
  async function toggleFavorite(id) {
    if (!isOwner) return;
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    const newVal = !entry.favorite;
    try {
      await col.doc(id).update({ favorite: newVal });
      showToast(newVal ? 'Added to favorites!' : 'Removed from favorites.');
    } catch(e) { showToast('Error updating.'); }
  }

  // ── Stats pills (filter bar) ──────────────────────────────
  // baseEntries = already filtered by year+search (but NOT by category)
  function buildTypePills(baseEntries) {
    const el = document.getElementById('statsPills');
    const total = baseEntries.length;

    // Update big counter
    document.getElementById('entryCountNum').textContent = total;

    const counts = {};
    baseEntries.forEach(e => { if (e.type) counts[e.type] = (counts[e.type] || 0) + 1; });
    const sorted = CATEGORIES.slice().sort(
      (a, b) => (counts[b.id] || 0) - (counts[a.id] || 0) || a.label.localeCompare(b.label)
    );

    let html = `<button class="stat-pill${activeFilter === 'All' ? ' active' : ''}"
      style="background:var(--base02)"
      onclick="setFilter('All')">All <span class="pill-count">${total}</span></button>`;

    sorted.forEach(cat => {
      const count = counts[cat.id] || 0;
      if (count === 0) return;
      const active = activeFilter === cat.id;
      html += `<button class="stat-pill${active ? ' active' : ''}"
        style="background:${cat.color}"
        onclick="setFilter('${cat.id}')">${cat.icon} ${cat.label}
        <span class="pill-count">${count}</span></button>`;
    });

    el.innerHTML = html;
    el.classList.toggle('has-filter', activeFilter !== 'All');
    lucide.createIcons({ el });
  }

  function setFilter(f) {
    activeFilter = f;
    renderEntries();
  }

  // ── Render ────────────────────────────────────────────────
  function renderAll() { buildYearDropdown(); renderEntries(); }

  function renderEntries() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const el = document.getElementById('entriesList');
    const searchMode = !!search;

    // All entries sorted by sortOrder (createdAt fallback for legacy entries)
    const allSorted = [...entries].sort((a, b) => getSortOrder(a) - getSortOrder(b));

    // Base set: year + search filtered, but NOT category filtered (used for pill counts)
    const baseFiltered = allSorted.filter(e => {
      const matchYear   = searchMode || getYear(e) === selectedYear;
      const matchSearch = !search || (e.title || '').toLowerCase().includes(search);
      return matchYear && matchSearch;
    });
    buildTypePills(baseFiltered);

    // Display set: also apply active category filter
    const filtered = activeFilter === 'All'
      ? baseFiltered
      : baseFiltered.filter(e => e.type === activeFilter);

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state">
        <i data-lucide="layout-dashboard"></i>
        <p>${searchMode
          ? 'No entries match your search.'
          : allSorted.filter(e => getYear(e) === selectedYear).length === 0
            ? `Nothing logged for ${selectedYear} yet.`
            : 'No entries match your filter.'}</p>
      </div>`;
      lucide.createIcons({ el });
      return;
    }

    function buildCatGroupHTML(items) {
      const groups = {};
      items.forEach(e => { (groups[e.type] = groups[e.type] || []).push(e); });
      const cats = Object.keys(groups)
        .map(id => ({ meta: catMeta(id), items: groups[id] }))
        .sort((a, b) => b.items.length - a.items.length);

      return cats.map(({ meta: cat, items: catItems }) => {
        const rows = catItems.map(e => {
          if (editMode && isOwner) {
            // Edit mode: star to the right of title, filled if favorited
            return `
              <div class="entry-row draggable" draggable="true" data-id="${e.id}">
                <i data-lucide="grip-vertical" class="drag-handle" style="width:18px;height:18px;flex-shrink:0"></i>
                <div class="entry-title" data-id="${e.id}" style="flex:1;min-width:0;padding:2px 4px;border-radius:4px">${escHtml(e.title)}</div>
                <button class="star-btn${e.favorite ? ' starred' : ''}" onclick="toggleFavorite('${e.id}')" title="Toggle favorite">
                  <i data-lucide="star"></i>
                </button>
                <button class="btn-icon edit-title-btn" data-id="${e.id}" onclick="toggleTitleEdit('${e.id}')">
                  <i data-lucide="square-pen" width="16" height="16"></i>
                </button>
                <button class="del-btn btn-icon" onclick="deleteEntry('${e.id}')">
                  <i data-lucide="x" width="16" height="16"></i>
                </button>
              </div>`;
          } else {
            // Normal view: only show star if favorited (filled, no outline otherwise)
            const starEl = e.favorite
              ? `<span class="fav-badge"><i data-lucide="star" style="width:15px;height:15px;fill:var(--gold);stroke:var(--gold)"></i></span>`
              : '';
            return `
              <div class="entry-row">
                <div class="entry-title">${escHtml(e.title)}</div>
                ${starEl}
              </div>`;
          }
        }).join('');

        return `<div class="cat-group">
          <div class="cat-group-header" style="color:${cat.color}">
            ${cat.icon} ${cat.label}
            <span class="cat-count" style="background:${cat.color}">${catItems.length}</span>
          </div>
          <div class="entry-list">${rows}</div>
        </div>`;
      });
    }

    if (searchMode) {
      const yearMap = {};
      filtered.forEach(e => {
        const y = getYear(e) || 'Unknown';
        (yearMap[y] = yearMap[y] || []).push(e);
      });
      const sortedYears = Object.keys(yearMap).sort((a, b) => b - a);
      const allCards = [];
      sortedYears.forEach(year => {
        allCards.push(`<div style="grid-column:1/-1;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:6px 0 2px">${year}</div>`);
        allCards.push(...buildCatGroupHTML(yearMap[year]));
      });
      el.innerHTML = allCards.join('');
    } else {
      const catCards = buildCatGroupHTML(filtered);
      const groups = {};
      filtered.forEach(e => { (groups[e.type] = groups[e.type] || []).push(e); });
      const catsWithEntries = Object.keys(groups)
        .map(id => ({ id, count: groups[id].length }))
        .sort((a, b) => b.count - a.count);

      // Greedy masonry: fill shortest column
      const colCount = window.innerWidth <= 768 ? 1 : 3;
      const columns = Array.from({ length: colCount }, () => ({ html: '', height: 0 }));
      catsWithEntries.forEach((cat, i) => {
        const shortest = columns.reduce((min, col, idx) => col.height < columns[min].height ? idx : min, 0);
        columns[shortest].html += catCards[i];
        columns[shortest].height += cat.count + 2;
      });

      el.innerHTML = colCount === 1
        ? columns[0].html
        : columns.map(col => `<div class="masonry-col">${col.html}</div>`).join('');
    }

    lucide.createIcons({ el });
    attachDragListeners();
  }

  function attachDragListeners() {
    if (!editMode || !isOwner) return;
    document.querySelectorAll('.entry-row[draggable]').forEach(row => {
      row.addEventListener('dragstart', e => {
        draggedEntry = row.dataset.id;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      row.addEventListener('dragend', () => {
        row.classList.remove('dragging');
        draggedEntry = null;
        document.querySelectorAll('.entry-row').forEach(r => r.classList.remove('drag-over'));
      });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (draggedEntry && draggedEntry !== row.dataset.id) row.classList.add('drag-over');
      });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', async e => {
        e.preventDefault();
        if (draggedEntry && draggedEntry !== row.dataset.id) await moveEntry(draggedEntry, row.dataset.id);
      });
    });

    document.querySelectorAll('.entry-title[data-id]').forEach(titleEl => {
      titleEl.addEventListener('blur', async () => {
        if (titleEl.contentEditable !== 'true') return;
        const id = titleEl.dataset.id;
        const newTitle = titleEl.textContent.trim();
        const oldEntry = entries.find(e => e.id === id);
        if (newTitle && newTitle !== oldEntry?.title) {
          try { await col.doc(id).update({ title: newTitle }); showToast('Renamed.'); }
          catch(err) { showToast('Error saving.'); titleEl.textContent = oldEntry?.title || ''; }
        } else {
          titleEl.textContent = oldEntry?.title || '';
        }
        finishTitleEdit(id);
      });
      titleEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
        else if (e.key === 'Escape') {
          e.preventDefault();
          const id = titleEl.dataset.id;
          titleEl.textContent = entries.find(ent => ent.id === id)?.title || '';
          finishTitleEdit(id);
        }
      });
    });
  }

  function toggleTitleEdit(id) {
    const titleEl = document.querySelector(`.entry-title[data-id="${id}"]`);
    const btnEl   = document.querySelector(`.edit-title-btn[data-id="${id}"]`);
    if (!titleEl || !btnEl) return;
    if (titleEl.contentEditable === 'true') {
      titleEl.blur();
    } else {
      titleEl.contentEditable = 'true';
      titleEl.style.background   = 'var(--surface)';
      titleEl.style.outline      = '2px solid var(--base02)';
      titleEl.style.whiteSpace   = 'normal';
      btnEl.innerHTML = '<i data-lucide="check" width="16" height="16"></i>';
      lucide.createIcons({ el: btnEl });
      titleEl.focus();
      setTimeout(() => {
        const range = document.createRange();
        range.selectNodeContents(titleEl);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }, 0);
    }
  }

  function finishTitleEdit(id) {
    const titleEl = document.querySelector(`.entry-title[data-id="${id}"]`);
    const btnEl   = document.querySelector(`.edit-title-btn[data-id="${id}"]`);
    if (!titleEl || !btnEl) return;
    titleEl.contentEditable = 'false';
    titleEl.style.background = '';
    titleEl.style.outline    = '';
    titleEl.style.whiteSpace = '';
    btnEl.innerHTML = '<i data-lucide="square-pen" width="16" height="16"></i>';
    lucide.createIcons({ el: btnEl });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init Lucide icons for static HTML ────────────────────
  lucide.createIcons();

  // ── Export ────────────────────────────────────────────────
  function exportCSV() {
    closeAllDropdowns();
    if (!entries.length) { showToast('Nothing to export yet.'); return; }
    const rows = entries.map(e =>
      [`"${(e.title||'').replace(/"/g,'""')}"`, getYear(e), e.type, e.favorite ? 'Yes' : 'No'].join(',')
    );
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['Title,Year,Category,Favorite\n' + rows.join('\n')], { type: 'text/csv' }));
    a.download = `media-log-all.csv`;
    a.click();
    showToast('CSV exported!');
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
